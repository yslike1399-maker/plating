        const COMPANY_INFO = {
          name: '주식회사 골드',

        const COLOR_DEFS = [
          { name: '대금', displayName: '대금(골드)', finishType: 'both' },
          { name: '니켈', displayName: '니켈(실버)', finishType: 'both' },
          { name: '흑진주', displayName: '흑진주(블랙)', finishType: 'both' },
          { name: '흑골드', displayName: '흑골드(다크골드)', finishType: 'both' },
          { name: '로즈골드 대용금', displayName: '로즈골드 대용금(로즈골드)', finishType: 'both' },
          { name: '은', displayName: '은(리얼은도금)', finishType: 'glossOnly' },
          { name: '14k대용금', displayName: '14k대용금(14k도금)', finishType: 'glossOnly' },
          { name: '동착', displayName: '동착(흑코팅 전처리)', finishType: 'other' },
        ];

        const FINISH_OPTIONS = ['유광', '반무광'];
        const GRIND_OPTIONS = ['연마', '연마 제외', '연마 완료'];

        // 화면 표시용 (직원용 - 설명 포함, 줄바꿈)
        const getColorDisplayName = (name) => {
          const color = COLOR_DEFS.find(c => c.name === name);
          if (!color) return name;
          const parts = color.displayName.match(/^([^(]+)\(([^)]+)\)$/);
          if (parts) {
            return <>{parts[1]}<br/>({parts[2]})</>;
          }
          return color.displayName;
        };

        // 엑셀용 색상명 (공장용 - 설명 없음)
        const excelColorName = (name, finish) => {
          if (!finish) return name;
          if (name === '로즈골드 대용금') {
            return finish === '유광' ? '로즈골드(대용금)유광' : '로즈골드(반무광)대용금';
          }
          return `${name}(${finish})`;
        };

        const formatDate = (date) => date.toISOString().split('T')[0];

        function App() {
          const [activeMainTab, setActiveMainTab] = useState('dashboard');
          
          const [activeFabricTab, setActiveFabricTab] = useState('suppliers');
          const [newSupplier, setNewSupplier] = useState({ name: '', phone: '', mobile: '', location: '' });
          const [newFabric, setNewFabric] = useState({});
          const [openFabricForm, setOpenFabricForm] = useState({});
          const [editingOrderId, setEditingOrderId] = useState(null);
          const [editingOrderData, setEditingOrderData] = useState({});
          const [expandedRecords, setExpandedRecords] = useState({});
          const [salaryPopup, setSalaryPopup] = useState(null);
          const [empRegPopup, setEmpRegPopup] = useState(false);
          const [freelancerRegPopup, setFreelancerRegPopup] = useState(false);
          const [workPopup, setWorkPopup] = useState(null);
          const [editFreelancerPopup, setEditFreelancerPopup] = useState(null);
          const [editEmployeePopup, setEditEmployeePopup] = useState(null);
          const [graphModes, setGraphModes] = useState({}); // {freelancerId: 'qty'|'amount'}
          const SUPPLIER_COLORS = [
            { border: 'border-blue-400', bg: 'bg-blue-50', badge: 'bg-blue-500', text: 'text-blue-700' },
            { border: 'border-emerald-400', bg: 'bg-emerald-50', badge: 'bg-emerald-500', text: 'text-emerald-700' },
            { border: 'border-violet-400', bg: 'bg-violet-50', badge: 'bg-violet-500', text: 'text-violet-700' },
            { border: 'border-amber-400', bg: 'bg-amber-50', badge: 'bg-amber-500', text: 'text-amber-700' },
            { border: 'border-rose-400', bg: 'bg-rose-50', badge: 'bg-rose-500', text: 'text-rose-700' },
            { border: 'border-cyan-400', bg: 'bg-cyan-50', badge: 'bg-cyan-500', text: 'text-cyan-700' },
            { border: 'border-orange-400', bg: 'bg-orange-50', badge: 'bg-orange-500', text: 'text-orange-700' },
            { border: 'border-pink-400', bg: 'bg-pink-50', badge: 'bg-pink-500', text: 'text-pink-700' },
          ];
          const [selectedFabricForOrder, setSelectedFabricForOrder] = useState(null);
          const [searchQuery, setSearchQuery] = useState('');
          const [orderItems, setOrderItems] = useState([]);
          const [editingFabric, setEditingFabric] = useState({});
          const [fabricColors, setFabricColors] = useState({});
          const [currentOrder, setCurrentOrder] = useState(null);
          const [activeTab, setActiveTab] = useState('products');
          const [products, setProducts] = useState([]);
          const [history, setHistory] = useState([]);
          
          // 도금미수금 데이터
          const [receivables, setReceivables] = useState([]);
          // 거래처관리 상태
          const [vendors, setVendors] = useState([]); // 거래처 목록
          const [vendorBills, setVendorBills] = useState([]); // 월정산 청구
          const [vendorPayments, setVendorPayments] = useState([]); // 지급 내역
          const [vendorItems, setVendorItems] = useState([]); // 건별 거래
          const [activeVendorTab, setActiveVendorTab] = useState(null); // 선택된 거래처 id
          const [vendorRegPopup, setVendorRegPopup] = useState(false);
          const [billPopup, setBillPopup] = useState(null); // {vendorId, bill?}
          const [itemPopup, setItemPopup] = useState(null); // {vendorId, item?}
          const [payPopup, setPayPopup] = useState(null); // {vendorId, billId?}
          const [fabricSuppliersState, setFabricSuppliersState] = useState([]);
          const [fabricOrders, setFabricOrders] = useState([]);

          
          // 프리랜서 데이터
          const [freelancers, setFreelancers] = useState([]);
          const [freelancerWorks, setFreelancerWorks] = useState([]);
          const [filterMonth, setFilterMonth] = useState('');
          const [filterFreelancerId, setFilterFreelancerId] = useState('');
          
          // 급여관리 데이터
          const [employees, setEmployees] = useState([]);
          const [salaryRecords, setSalaryRecords] = useState([]);
          const [salaryPayments, setSalaryPayments] = useState([]);
          
          const [productForm, setProductForm] = useState({
            name: '', 
            grindRequired: true, 
            image: null, 
            imagePreview: null,
            grindCost: '',
            injectionCost: '',
            springCost: '',
            pinCost: '',
            platingCosts: {} // 색상별 유광/반무광 도금 단가
          });

          const [editingProduct, setEditingProduct] = useState(null);

          const [orderForm, setOrderForm] = useState({
            date: formatDate(new Date()), products: []
          });

          useEffect(() => {
            try {
              const savedProducts = localStorage.getItem('plating_products');
              const savedHistory = localStorage.getItem('plating_history');
              const savedReceivables = localStorage.getItem('plating_receivables');
              const savedVendors = localStorage.getItem('vendors');
              const savedVendorBills = localStorage.getItem('vendor_bills');
              const savedVendorPayments = localStorage.getItem('vendor_payments');
              const savedVendorItems = localStorage.getItem('vendor_items');
              const savedFreelancers = localStorage.getItem('plating_freelancers');
              const savedFreelancerWorks = localStorage.getItem('plating_freelancer_works');
              const savedEmployees = localStorage.getItem('salary_employees');
              const savedSalaryRecords = localStorage.getItem('salary_records');
              const savedSalaryPayments = localStorage.getItem('salary_payments');
              const savedFabricOrders = localStorage.getItem('fabric_orders');
              
              if (savedProducts) setProducts(JSON.parse(savedProducts));
              if (savedHistory) setHistory(JSON.parse(savedHistory));
              if (savedReceivables) setReceivables(JSON.parse(savedReceivables));
              if (savedVendors) { const v = JSON.parse(savedVendors); setVendors(v); if(v.length>0) setActiveVendorTab(v[0].id); }
              if (savedVendorBills) setVendorBills(JSON.parse(savedVendorBills));
              if (savedVendorPayments) setVendorPayments(JSON.parse(savedVendorPayments));
              if (savedVendorItems) setVendorItems(JSON.parse(savedVendorItems));
              const savedFabricSuppliers = localStorage.getItem('fabric_suppliers');
              if (savedFabricSuppliers) setFabricSuppliersState(JSON.parse(savedFabricSuppliers));

              if (savedFreelancers) setFreelancers(JSON.parse(savedFreelancers));
              if (savedFreelancerWorks) setFreelancerWorks(JSON.parse(savedFreelancerWorks));
              if (savedEmployees) setEmployees(JSON.parse(savedEmployees));
              if (savedSalaryRecords) setSalaryRecords(JSON.parse(savedSalaryRecords));
              if (savedSalaryPayments) setSalaryPayments(JSON.parse(savedSalaryPayments));
              if (savedFabricOrders) setFabricOrders(JSON.parse(savedFabricOrders));
            } catch (e) {
              console.error('localStorage 오류:', e);
              alert('데이터 로드 실패. Chrome을 --allow-file-access-from-files 플래그로 실행하세요.');
            }
          }, []);

          const saveProducts = (data) => {
            setProducts(data);
            try {
              localStorage.setItem('plating_products', JSON.stringify(data));
            } catch (e) {
              console.error('저장 오류:', e);
            }
          };

          const saveHistory = (data) => {
            setHistory(data);
            try {
              localStorage.setItem('plating_history', JSON.stringify(data));
            } catch (e) {
              console.error('저장 오류:', e);
            }
          };

          const saveReceivables = (data) => {
            setReceivables(data);
            try {
              localStorage.setItem('plating_receivables', JSON.stringify(data));
            } catch (e) {
              console.error('저장 오류:', e);
            }
          };

          const saveFabricSuppliers = (data) => {
            setFabricSuppliersState(data);
            try {
              localStorage.setItem('fabric_suppliers', JSON.stringify(data));
            } catch (e) {
              console.error('저장 오류:', e);
            }
          };

          const saveFreelancers = (data) => {
            setFreelancers(data);
            try {
              localStorage.setItem('plating_freelancers', JSON.stringify(data));
            } catch (e) {
              console.error('저장 오류:', e);
            }
          };

          const saveFreelancerWorks = (data) => {
            setFreelancerWorks(data);
            try {
              localStorage.setItem('plating_freelancer_works', JSON.stringify(data));
            } catch (e) {
              console.error('저장 오류:', e);
            }
          };

          const saveEmployees = (data) => {
            setEmployees(data);
            try {
              localStorage.setItem('salary_employees', JSON.stringify(data));
            } catch (e) {
              console.error('저장 오류:', e);
            }
          };

          const saveSalaryRecords = (data) => {
            setSalaryRecords(data);
            try {
              localStorage.setItem('salary_records', JSON.stringify(data));
            } catch (e) {
              console.error('저장 오류:', e);
            }
          };

          const saveSalaryPayments = (data) => {
            setSalaryPayments(data);
            try {
              localStorage.setItem('salary_payments', JSON.stringify(data));
            } catch (e) {
              console.error('저장 오류:', e);
            }
          };

          const handleImageUpload = (e) => {
            const file = e.target.files[0];
            if (file) {
              const reader = new FileReader();
              reader.onloadend = () => {
                setProductForm({...productForm, image: reader.result, imagePreview: reader.result});
              };
              reader.readAsDataURL(file);
            }
          };

          const handleAddProduct = () => {
            if (!productForm.name.trim()) return alert('제품명을 입력하세요');
            const newProduct = {
              id: Date.now(),
              name: productForm.name,
              grindRequired: productForm.grindRequired,
              image: productForm.image,
              platingCosts: productForm.platingCosts,
              grindCost: productForm.grindCost,
              injectionCost: productForm.injectionCost,
              springCost: productForm.springCost,
              pinCost: productForm.pinCost,
              createdAt: new Date().toISOString()
            };
            saveProducts([...products, newProduct]);
            setProductForm({ 
              name: '', 
              grindRequired: true, 
              image: null, 
              imagePreview: null,
              grindCost: '',
              injectionCost: '',
              springCost: '',
              pinCost: '',
              platingCosts: {}
            });
            alert('제품 등록 완료!');
          };

          const handleDeleteProduct = (id) => {
            if (confirm('삭제하시겠습니까?')) {
              saveProducts(products.filter(p => p.id !== id));
            }
          };

          const handleEditProduct = (product) => {
            setEditingProduct(product);
            setProductForm({
              name: product.name,
              grindRequired: product.grindRequired,
              image: product.image,
              imagePreview: product.image,
              platingCosts: product.platingCosts || {},
              grindCost: product.grindCost || '',
              injectionCost: product.injectionCost || '',
              springCost: product.springCost || '',
              pinCost: product.pinCost || ''
            });
          };

          const handleUpdateProduct = () => {
            if (!productForm.name.trim()) return alert('제품명을 입력하세요');
            
            const updatedProducts = products.map(p => 
              p.id === editingProduct.id ? {
                ...p,
                name: productForm.name,
                grindRequired: productForm.grindRequired,
                image: productForm.image,
                platingCosts: productForm.platingCosts,
                grindCost: productForm.grindCost,
                injectionCost: productForm.injectionCost,
                springCost: productForm.springCost,
                pinCost: productForm.pinCost
              } : p
            );
            
            saveProducts(updatedProducts);
            setEditingProduct(null);
            setProductForm({
              name: '', 
              grindRequired: true, 
              image: null, 
              imagePreview: null,
              grindCost: '',
              injectionCost: '',
              springCost: '',
              pinCost: '',
              platingCosts: {}
            });
            alert('제품 수정 완료!');
          };

          const handleAddProductToOrder = (productId) => {
            if (!productId) return alert('제품을 선택하세요');
            
            const product = products.find(p => p.id === productId);
            
            // 이미 추가된 연마 상태 찾기
            const existingGrinds = orderForm.products
              .filter(p => p.productId === productId)
              .map(p => p.grind);
            
            // 사용 가능한 연마 상태 찾기
            const availableGrind = GRIND_OPTIONS.find(g => !existingGrinds.includes(g));
            
            if (!availableGrind) {
              return alert(`"${product.name}"의 모든 연마 상태가 이미 추가되었습니다.`);
            }
            
            // 연마 필요 여부에 따라 기본값 설정
            let defaultGrind = product.grindRequired ? '연마' : '연마 제외';
            const grindToUse = existingGrinds.includes(defaultGrind) ? availableGrind : defaultGrind;
            
            setOrderForm({
              ...orderForm,
              products: [{
                productId: product.id,
                productName: product.name,
                grindRequired: product.grindRequired,
                grind: grindToUse,
                image: product.image,
                items: []
              }, ...orderForm.products]
            });
            
            if (grindToUse !== defaultGrind) {
              alert(`"${product.name} (${defaultGrind})"는 이미 추가되어\n자동으로 "${grindToUse}"로 추가되었습니다.`);
            }
          };

          const handleRemoveProductFromOrder = (productId, grind) => {
            setOrderForm({
              ...orderForm,
              products: orderForm.products.filter(p => !(p.productId === productId && p.grind === grind))
            });
          };

          const updateGrind = (productId, oldGrind, newGrind) => {
            const newProducts = orderForm.products.map(p => {
              if (p.productId === productId && p.grind === oldGrind) {
                return {...p, grind: newGrind};
              }
              return p;
            });
            setOrderForm({ ...orderForm, products: newProducts });
          };

          const handleAddColorItem = (productId, grind) => {
            const newProducts = orderForm.products.map(p => {
              if (p.productId === productId && p.grind === grind) {
                return {...p, items: [...p.items, { color: '대금', finish: '유광', qty: 1 }]};
              }
              return p;
            });
            setOrderForm({ ...orderForm, products: newProducts });
          };

          const handleRemoveColorItem = (productId, grind, itemIndex) => {
            const newProducts = orderForm.products.map(p => {
              if (p.productId === productId && p.grind === grind) {
                return {...p, items: p.items.filter((_, i) => i !== itemIndex)};
              }
              return p;
            });
            setOrderForm({ ...orderForm, products: newProducts });
          };

          const updateColorItem = (productId, grind, itemIndex, field, value) => {
            const newProducts = orderForm.products.map(p => {
              if (p.productId === productId && p.grind === grind) {
                const newItems = [...p.items];
                newItems[itemIndex] = { ...newItems[itemIndex], [field]: value };
                return { ...p, items: newItems };
              }
              return p;
            });
            setOrderForm({ ...orderForm, products: newProducts });
          };

          const handleCreateOrder = () => {
            if (orderForm.products.length === 0) {
              alert('제품을 추가하세요');
              return;
            }
            
            for (const product of orderForm.products) {
              if (product.items.length === 0) {
                alert(`${product.productName} (${product.grind})에 색상을 추가하세요`);
                return;
              }
              
              const colorMap = new Map();
              for (const item of product.items) {
                const colorKey = excelColorName(item.color, item.finish);
                if (colorMap.has(colorKey)) {
                  alert(`${product.productName}에 중복된 색상이 있습니다:\n"${colorKey}"\n\n같은 색상/구분은 수량을 합쳐서 하나로 입력해주세요.`);
                  return;
                }
                colorMap.set(colorKey, true);
              }
            }

                                    const overpaid = totalPaid - record.totalAmount;

                                              {(() => {

                                                const maxVal = Math.max(...empRecs.map(r => { const p = salaryPayments.filter(x=>x.salaryRecordId===r.id).reduce((s,x)=>s+x.amount,0); return Math.max(p,r.totalAmount); }), emp.monthlySalary, 1);

                                                      {empRecs.map((r,i) => {
                                                        const paid = salaryPayments.filter(p=>p.salaryRecordId===r.id).reduce((s,p)=>s+p.amount,0);
                                                        const base=emp.monthlySalary, total=Math.max(paid,r.totalAmount), bonus=Math.max(0,total-base);
                                                        const baseH=Math.round((Math.min(total,base)/maxVal)*chartH), bonusH=Math.round((bonus/maxVal)*chartH);
                                                        const x=i*(barW+gap);
                                                        return (
                                                          <g key={r.id}>
                                                            <rect x={x} y={chartH-baseH} width={barW} height={baseH} fill="#3b82f6" rx="3"/>

                                                            {bonusH>0 && <rect x={x} y={chartH-baseH-bonusH} width={barW} height={bonusH} fill="#ef4444" rx="3"/>}
                                                            {bonusH>14 && <text x={x+barW/2} y={chartH-baseH-5} textAnchor="middle" fontSize="9" fill="white" fontWeight="bold">{Math.round(bonus/10000)}만</text>}
                                                            <text x={x+barW/2} y={chartH+14} textAnchor="middle" fontSize="9" fill="#64748b">{r.month.substring(5)}</text>
                                                          </g>
                                                        );
                                                      })}
                                                    </svg>
                                                    <div className="flex items-center gap-3 mt-1 justify-center">
                                                      <span className="flex items-center gap-1 text-xs text-slate-500"><span style={{width:10,height:10,background:'#3b82f6',display:'inline-block',borderRadius:2}}></span>기본급</span>
                                                      <span className="flex items-center gap-1 text-xs text-slate-500"><span style={{width:10,height:10,background:'#ef4444',display:'inline-block',borderRadius:2}}></span>상여금</span>
                                                    </div>
                                                  </div>

                                                <input type="date" id={`date_${record.id}`} defaultValue={new Date().toISOString().split('T')[0]} className="px-3 py-2 rounded-xl border-2 border-slate-200 focus:border-blue-500 outline-none text-sm"/>

                                                  if(amount>remaining) return alert('미지급액을 초과할 수 없습니다');
                                                  saveSalaryPayments([...salaryPayments, {id:Date.now(), salaryRecordId:record.id, amount, payDate, paymentOrder:payments.length+1, note:'', createdAt:new Date().toISOString()}]);
                                                  document.getElementById(`pay_${record.id}`).value='';
                                                  alert(`${amount.toLocaleString()}원 지급 (${payments.length+1}차)`);
                                                }} className="px-4 py-2 bg-gradient-to-r from-blue-600 to-purple-600 text-white rounded-xl font-bold text-sm">지급</button>
                                              </div>

                                            {/* 상여금 신고 영역 */}
                                            {(() => {
                                              const empAllRecs = salaryRecords.filter(r=>r.employeeId===emp.id).sort((a,b)=>a.month.localeCompare(b.month));
                                              let carryOverBonus=0;

                                              empAllRecs.forEach(r => {
                                                if(r.month>=record.month) return;
                                                const paid=salaryPayments.filter(p=>p.salaryRecordId===r.id).reduce((s,p)=>s+p.amount,0);
                                                const over=Math.max(0, paid-emp.monthlySalary);
                                                if(over>0 && !r.bonusReported){ carryOverBonus+=over; carryDetails.push({month:r.month,amount:over,reported:false}); }
                                                if(over>0 && r.bonusReported){ carryOverBonus=Math.max(0,carryOverBonus-over); carryDetails.push({month:r.month,amount:over,reported:true}); }
                                              });
                                              const thisBonusOverpaid=Math.max(0,totalPaid-emp.monthlySalary);
                                              const totalUnreported=carryOverBonus+(thisBonusOverpaid>0&&!record.bonusReported?thisBonusOverpaid:0);
                                              return (
                                                <div className="mt-3 space-y-2">
                                                  {carryDetails.length>0 && (
                                                    <div className="bg-amber-50 border border-amber-300 rounded-xl px-4 py-3 text-xs text-amber-800">
                                                      <div className="flex items-center gap-2 mb-2 font-bold"><span>📦</span><span>전월 이월 미신고 상여금: <strong>{carryOverBonus.toLocaleString()}원</strong></span></div>
                                                      <div className="space-y-1 pl-5 border-l-2 border-amber-300">
                                                        {carryDetails.map((d,i)=>(
                                                          <div key={i} className="flex items-center justify-between gap-4">
                                                            <span className="text-amber-700">{d.month}</span>
                                                            <span className="font-semibold">{d.amount.toLocaleString()}원</span>
                                                            {d.reported?<span className="text-green-600 font-semibold">✅ 신고완료</span>:<span className="text-red-500 font-semibold">🔴 미신고</span>}
                                                          </div>
                                                        ))}
                                                      </div>
                                                    </div>
                                                  )}
                                                  {thisBonusOverpaid>0 && (
                                                    <div className="bg-orange-50 border border-orange-300 rounded-xl px-4 py-2 text-xs text-orange-800 flex items-center justify-between">
                                                      <span className="flex items-center gap-2"><span>📅</span><span>이번달({record.month}) 초과분</span></span>
                                                      <span className="font-bold">{thisBonusOverpaid.toLocaleString()}원</span>
                                                    </div>
                                                  )}
                                                  {totalUnreported>0 && (
                                                    <div className="bg-red-50 border-2 border-red-400 rounded-xl px-4 py-2 text-xs flex items-center justify-between" style={{animation:'pulse 1.2s ease-in-out infinite'}}>

                                                      <span className="text-red-600 font-bold text-sm">{totalUnreported.toLocaleString()}원</span>
                                                    </div>
                                                  )}
                                                  <div className={`rounded-xl border-2 px-3 py-2 ${record.bonusReported?'border-green-400 bg-green-50':thisBonusOverpaid>0||carryOverBonus>0?'border-red-300 bg-red-50':'border-slate-100 bg-slate-50'}`}>
                                                    <div className="text-xs font-bold text-slate-600 mb-1">🎁 상여금 신고
                                                      {(thisBonusOverpaid>0||carryOverBonus>0)&&!record.bonusReported&&<span className="ml-1 text-red-500">({totalUnreported.toLocaleString()}원 미신고)</span>}
                                                    </div>
                                                    {record.bonusReported?(
                                                      <div className="flex items-center gap-1 text-xs text-green-700">
                                                        <span>✅ 신고완료 ({record.bonusReportDate})</span>
                                                        <button onClick={()=>saveSalaryRecords(salaryRecords.map(r=>r.id===record.id?{...r,bonusReported:false,bonusReportDate:''}:r))} className="ml-auto text-red-400 hover:text-red-600 text-xs">취소</button>
                                                      </div>
                                                    ):thisBonusOverpaid>0||carryOverBonus>0?(
                                                      <div className="flex items-center gap-1">
                                                        <input type="date" id={`bonusRptDate_${record.id}`} defaultValue={new Date().toISOString().split('T')[0]} className="flex-1 px-1 py-0.5 rounded border border-slate-200 text-xs min-w-0"/>
                                                        <button onClick={()=>{
                                                          const d=document.getElementById(`bonusRptDate_${record.id}`).value;
                                                          if(!d) return alert('신고일자 선택하세요');
                                                          saveSalaryRecords(salaryRecords.map(r=>r.id===record.id?{...r,bonusReported:true,bonusReportDate:d}:r));
                                                        }} className="bg-red-500 text-white px-3 py-0.5 rounded text-xs font-bold hover:bg-red-600 shrink-0">신고완료</button>
                                                      </div>
                                                    ):<div className="text-xs text-slate-400">이달 상여금 없음</div>}
                                                  </div>
                                                </div>
                                              );
                                            })()}

                                            {/* 지급 상세 */}
                                            {payments.length>0 && (
                                              <div className="bg-slate-50 rounded-xl p-4 mt-4">
                                                <h4 className="text-sm font-bold text-slate-700 mb-3">지급 상세 ({payments.length}차)</h4>
                                                <div className="overflow-x-auto">
                                                  <table className="w-full text-sm">
                                                    <thead>
                                                      <tr className="border-b border-slate-300">
                                                        <th className="text-left py-2 px-3 font-bold">차수</th>
                                                        <th className="text-left py-2 px-3 font-bold">지급일</th>
                                                        <th className="text-right py-2 px-3 font-bold">지급액</th>
                                                        <th className="text-left py-2 px-3 font-bold">비고</th>
                                                        <th className="text-center py-2 px-3 font-bold">삭제</th>
                                                      </tr>
                                                    </thead>
                                                    <tbody>
                                                      {payments.sort((a,b)=>a.paymentOrder-b.paymentOrder).map(payment=>(
                                                        <tr key={payment.id} className="border-b border-slate-200">
                                                          <td className="py-2 px-3 font-bold text-blue-600">{payment.paymentOrder}차</td>
                                                          <td className="py-2 px-3">{payment.payDate}</td>
                                                          <td className="text-right py-2 px-3 font-bold text-green-600">{payment.amount.toLocaleString()}원</td>
                                                          <td className="py-2 px-3">
                                                            <input type="text" value={payment.note||''} onChange={e=>saveSalaryPayments(salaryPayments.map(p=>p.id===payment.id?{...p,note:e.target.value}:p))} placeholder="비고" className="w-full px-2 py-1 text-xs rounded border border-slate-200 outline-none"/>
                                                          </td>
                                                          <td className="text-center py-2 px-3">
                                                            <button onClick={()=>{if(confirm('삭제하시겠습니까?'))saveSalaryPayments(salaryPayments.filter(p=>p.id!==payment.id));}} className="p-1 text-red-500 hover:bg-red-50 rounded"><Trash /></button>
                                                          </td>
                                                        </tr>
                                                      ))}
                                                    </tbody>
                                                  </table>
                                                </div>
                                              </div>
                                            )}
                                          </div>
                                        )}
                                      </div>
                                    );
                                  })}
                                </div>
                              </div>
                            ))}
                          </div>
                        );
                      })()}
                    </div>

                    {/* 연간 상여금 요약 */}
                    <div className="bg-white rounded-3xl shadow-xl border border-slate-200/60 p-8">
                      <h2 className="text-xl font-bold text-slate-900 mb-6">📊 연간 상여금 요약</h2>
                      {(() => {
                        const currentYear = new Date().getFullYear();
                        const activeEmps = employees.filter(e => e.active);
                        if (activeEmps.length === 0) return <p className="text-slate-400 text-center py-8">등록된 직원이 없습니다</p>;

                        return (
                          <div className="space-y-6">
                            {activeEmps.map(emp => {
                              // 해당 직원의 올해 급여 기록
                              const empRecords = salaryRecords.filter(r =>
                                r.employeeId === emp.id && r.month.startsWith(String(currentYear))
                              ).sort((a, b) => a.month.localeCompare(b.month));

                              // 월별 상여금 계산
                              const monthlyBonus = empRecords.map(r => {
                                const paid = salaryPayments.filter(p => p.salaryRecordId === r.id).reduce((s, p) => s + p.amount, 0);
                                const over = Math.max(0, paid - emp.monthlySalary);
                                return { month: r.month, bonus: over, reported: r.bonusReported || false, reportDate: r.bonusReportDate || '' };
                              });

                              const totalBonus = monthlyBonus.reduce((s, m) => s + m.bonus, 0);
                              const reportedBonus = monthlyBonus.filter(m => m.reported).reduce((s, m) => s + m.bonus, 0);
                              const unreportedBonus = totalBonus - reportedBonus;

                              if (empRecords.length === 0) return null;

                              return (
                                <div key={emp.id} className="border border-slate-200 rounded-2xl overflow-hidden">
                                  {/* 직원 헤더 */}
                                  <div className="bg-slate-50 px-5 py-3 flex items-center justify-between">
                                    <div>
                                      <span className="font-bold text-slate-900">{emp.name}</span>
                                      <span className="text-slate-500 text-sm ml-2">({emp.position})</span>
                                      <span className="text-slate-400 text-xs ml-2">{currentYear}년</span>
                                    </div>
                                    <div className="flex gap-4 text-sm">
                                      <span className="text-slate-600">총 상여: <strong className="text-slate-900">{totalBonus.toLocaleString()}원</strong></span>
                                      <span className="text-green-600">신고완료: <strong>{reportedBonus.toLocaleString()}원</strong></span>
                                      {unreportedBonus > 0 && (
                                        <span className="text-red-600" style={{animation:'pulse 1.2s ease-in-out infinite'}}>미신고: <strong>{unreportedBonus.toLocaleString()}원</strong></span>
                                      )}
                                    </div>
                                  </div>

                                  {/* 월별 상세 */}
                                  <div className="overflow-x-auto">
                                    <table className="w-full text-sm">
                                      <thead className="bg-slate-100 border-b border-slate-200">
                                        <tr>
                                          <th className="text-left py-2 px-4 text-xs font-semibold text-slate-600">월</th>
                                          <th className="text-right py-2 px-4 text-xs font-semibold text-slate-600">상여금</th>
                                          <th className="text-center py-2 px-4 text-xs font-semibold text-slate-600">신고상태</th>
                                          <th className="text-left py-2 px-4 text-xs font-semibold text-slate-600">신고일</th>
                                        </tr>
                                      </thead>
                                      <tbody>
                                        {monthlyBonus.map((m, idx) => (
                                          <tr key={m.month} className={`border-b border-slate-100 ${idx % 2 === 0 ? 'bg-white' : 'bg-slate-50'}`}>
                                            <td className="py-2 px-4 font-medium text-slate-700">{m.month}</td>
                                            <td className="py-2 px-4 text-right">
                                              {m.bonus > 0
                                                ? <span className="font-bold text-red-600">+{m.bonus.toLocaleString()}원</span>
                                                : <span className="text-slate-300">-</span>
                                              }
                                            </td>
                                            <td className="py-2 px-4 text-center">
                                              {m.bonus === 0 ? (
                                                <span className="text-xs text-slate-300">해당없음</span>
                                              ) : m.reported ? (
                                                <span className="bg-green-100 text-green-700 px-2 py-0.5 rounded-full text-xs font-semibold">✅ 신고완료</span>
                                              ) : (
                                                <span className="bg-red-100 text-red-600 px-2 py-0.5 rounded-full text-xs font-semibold" style={{animation:'pulse 1s ease-in-out infinite'}}>🔴 미신고</span>
                                              )}
                                            </td>
                                            <td className="py-2 px-4 text-xs text-slate-500">{m.reportDate || '-'}</td>
                                          </tr>
                                        ))}
                                        {/* 합계 행 */}
                                        <tr className="bg-slate-100 border-t-2 border-slate-300">
                                          <td className="py-2 px-4 font-bold text-slate-800">합계</td>
                                          <td className="py-2 px-4 text-right font-bold text-red-600">{totalBonus > 0 ? `+${totalBonus.toLocaleString()}원` : '-'}</td>
                                          <td className="py-2 px-4 text-center text-xs">
                                            <span className="text-green-600 font-semibold">{reportedBonus.toLocaleString()}원 완료</span>
                                            {unreportedBonus > 0 && <span className="text-red-500 font-semibold ml-2">{unreportedBonus.toLocaleString()}원 미신고</span>}
                                          </td>
                                          <td></td>
                                        </tr>
                                      </tbody>
                                    </table>
                                  </div>
                                </div>
                              );
                            })}
                          </div>
                        );
                      })()}
                    </div>

                    {/* 미지급 현황 */}
                    <div className="bg-gradient-to-br from-red-50 to-orange-50 rounded-3xl shadow-xl border-2 border-red-200 p-8">
                      <h2 className="text-xl font-bold text-red-900 mb-6">⚠️ 미지급 급여 현황</h2>
                      
                      {(() => {
                        const unpaid = salaryRecords.map(r => {
                          const emp = employees.find(e => e.id === r.employeeId);
                          const paid = salaryPayments.filter(p => p.salaryRecordId === r.id).reduce((s, p) => s + p.amount, 0);
                          const rem = Math.max(0, r.totalAmount - paid);
                          return { record: r, employee: emp, remaining: rem };
                        }).filter(i => i.remaining > 0);
                        
                        const total = unpaid.reduce((s, i) => s + i.remaining, 0);
                        
                        if (unpaid.length === 0) {
                          return <div className="text-center py-8 text-slate-600"><p className="text-lg font-semibold">✅ 모든 급여 지급 완료!</p></div>;
                        }
                        
                        return (
                          <>
                            <div className="bg-white rounded-2xl p-6 mb-6 border-2 border-red-300">
                              <p className="text-3xl font-bold text-red-600 text-center">{total.toLocaleString()}원</p>
                              <p className="text-center text-slate-600 mt-2">총 미지급액 ({unpaid.length}건)</p>
                            </div>
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                              {unpaid.map(({ record, employee, remaining }) => (
                                <div key={record.id} className="bg-white rounded-xl p-4 border-2 border-orange-200">
                                  <h4 className="font-bold text-slate-900">{employee?.name} ({employee?.position})</h4>
                                  <p className="text-sm text-slate-600">{record.month}</p>
                                  <p className="text-xl font-bold text-red-600 mt-2">{remaining.toLocaleString()}원</p>
                                </div>
                              ))}
                            </div>
                          </>
                        );
                      })()}
                    </div>
                  </div>
                )}

                {/* 중국발주 탭 */}
                {activeMainTab === 'china' && (
                  <div className="bg-white rounded-3xl shadow-xl border border-slate-200/60 p-16 text-center">
                    <div className="flex justify-center mb-4"><Package /></div>
                    <h2 className="text-2xl font-bold text-slate-900 mb-2">중국 발주 관리</h2>
                    <p className="text-slate-500">준비 중입니다</p>
                  </div>
                )}
              </main>

              <footer className="pb-6 text-center text-xs text-slate-400">
                <p>© 2026 LACEROOM통합관리 v20260421.25</p>
              </footer>
            </div>
          </div>
          );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
