        const { useState, useEffect } = React;

        const Package = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>;
        const FileText = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>;

        const Check = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="20 6 9 17 4 12"/></svg>;
        const Download = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>;
        const Copy = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>;
        const Image = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>;
        const Search = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>;
        const Upload = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>;

        const COMPANY_INFO = {
          name: '주식회사 골드',
          businessNumber: '159-87-02577',
          address: '경기도 양주시 고덕로 355번길 68-4',
          email: 'yslike1399@kakao.com'
        };

        const COLOR_DEFS = [
          { name: '대금', displayName: '대금(골드)', finishType: 'both' },
          { name: '니켈', displayName: '니켈(실버)', finishType: 'both' },
          { name: '흑진주', displayName: '흑진주(블랙)', finishType: 'both' },
          { name: '흑골드', displayName: '흑골드(다크골드)', finishType: 'both' },
          { name: '로즈골드 대용금', displayName: '로즈골드 대용금(로즈골드)', finishType: 'both' },
          { name: '은', displayName: '은(리얼은도금)', finishType: 'glossOnly' },
          { name: '14k대용금', displayName: '14k대용금(14k도금)', finishType: 'glossOnly' },
          { name: '동착', displayName: '동착(흑코팅 전처리)', finishType: 'other' },
        ];

        const FINISH_OPTIONS = ['유광', '반무광'];
        const GRIND_OPTIONS = ['연마', '연마 제외', '연마 완료'];

        // 화면 표시용 (직원용 - 설명 포함, 줄바꿈)
        const getColorDisplayName = (name) => {
          const color = COLOR_DEFS.find(c => c.name === name);
          if (!color) return name;
          const parts = color.displayName.match(/^([^(]+)\(([^)]+)\)$/);
          if (parts) {
            return <>{parts[1]}<br/>({parts[2]})</>;
          }
          return color.displayName;
        };

        // 엑셀용 색상명 (공장용 - 설명 없음)
        const excelColorName = (name, finish) => {
          if (!finish) return name;
          if (name === '로즈골드 대용금') {
            return finish === '유광' ? '로즈골드(대용금)유광' : '로즈골드(반무광)대용금';
          }
          return `${name}(${finish})`;
        };

        const formatDate = (date) => date.toISOString().split('T')[0];

        function App() {
          const [activeMainTab, setActiveMainTab] = useState('plating');
          
          const [activeFabricTab, setActiveFabricTab] = useState('suppliers');
          const [newSupplier, setNewSupplier] = useState({ name: '', phone: '', mobile: '', location: '' });
          const [newFabric, setNewFabric] = useState({});
          const [openFabricForm, setOpenFabricForm] = useState({});
          const [editingOrderId, setEditingOrderId] = useState(null);
          const [editingOrderData, setEditingOrderData] = useState({});
          const SUPPLIER_COLORS = [
            { border: 'border-blue-400', bg: 'bg-blue-50', badge: 'bg-blue-500', text: 'text-blue-700' },
            { border: 'border-emerald-400', bg: 'bg-emerald-50', badge: 'bg-emerald-500', text: 'text-emerald-700' },
            { border: 'border-violet-400', bg: 'bg-violet-50', badge: 'bg-violet-500', text: 'text-violet-700' },
            { border: 'border-amber-400', bg: 'bg-amber-50', badge: 'bg-amber-500', text: 'text-amber-700' },
            { border: 'border-rose-400', bg: 'bg-rose-50', badge: 'bg-rose-500', text: 'text-rose-700' },
            { border: 'border-cyan-400', bg: 'bg-cyan-50', badge: 'bg-cyan-500', text: 'text-cyan-700' },
            { border: 'border-orange-400', bg: 'bg-orange-50', badge: 'bg-orange-500', text: 'text-orange-700' },
            { border: 'border-pink-400', bg: 'bg-pink-50', badge: 'bg-pink-500', text: 'text-pink-700' },
          ];
          const [selectedFabricForOrder, setSelectedFabricForOrder] = useState(null);
          const [searchQuery, setSearchQuery] = useState('');
          const [orderItems, setOrderItems] = useState([]);
          const [editingFabric, setEditingFabric] = useState({});
          const [fabricColors, setFabricColors] = useState({});
          const [currentOrder, setCurrentOrder] = useState(null);
          const [activeTab, setActiveTab] = useState('products');
          const [products, setProducts] = useState([]);
          const [history, setHistory] = useState([]);
          
          // 도금미수금 데이터
          const [receivables, setReceivables] = useState([]);
          const [fabricSuppliersState, setFabricSuppliersState] = useState([]);
          const [fabricOrders, setFabricOrders] = useState([]);

          
          // 프리랜서 데이터
          const [freelancers, setFreelancers] = useState([]);
          const [freelancerWorks, setFreelancerWorks] = useState([]);
          const [filterMonth, setFilterMonth] = useState('');
          const [filterFreelancerId, setFilterFreelancerId] = useState('');
          
          // 급여관리 데이터
          const [employees, setEmployees] = useState([]);
          const [salaryRecords, setSalaryRecords] = useState([]);
          const [salaryPayments, setSalaryPayments] = useState([]);
          
          const [productForm, setProductForm] = useState({
            name: '', 
            grindRequired: true, 
            image: null, 
            imagePreview: null,
            grindCost: '',
            injectionCost: '',
            springCost: '',
            pinCost: '',
            platingCosts: {} // 색상별 유광/반무광 도금 단가
          });

          const [editingProduct, setEditingProduct] = useState(null);

          const [orderForm, setOrderForm] = useState({
            date: formatDate(new Date()), products: []
          });

          useEffect(() => {
            try {
              const savedProducts = localStorage.getItem('plating_products');
              const savedHistory = localStorage.getItem('plating_history');
              const savedReceivables = localStorage.getItem('plating_receivables');
              const savedFreelancers = localStorage.getItem('plating_freelancers');
              const savedFreelancerWorks = localStorage.getItem('plating_freelancer_works');
              const savedEmployees = localStorage.getItem('salary_employees');
              const savedSalaryRecords = localStorage.getItem('salary_records');
              const savedSalaryPayments = localStorage.getItem('salary_payments');
              const savedFabricOrders = localStorage.getItem('fabric_orders');
              
              if (savedProducts) setProducts(JSON.parse(savedProducts));
              if (savedHistory) setHistory(JSON.parse(savedHistory));
              if (savedReceivables) setReceivables(JSON.parse(savedReceivables));
              const savedFabricSuppliers = localStorage.getItem('fabric_suppliers');
              if (savedFabricSuppliers) setFabricSuppliersState(JSON.parse(savedFabricSuppliers));

              if (savedFreelancers) setFreelancers(JSON.parse(savedFreelancers));
              if (savedFreelancerWorks) setFreelancerWorks(JSON.parse(savedFreelancerWorks));
              if (savedEmployees) setEmployees(JSON.parse(savedEmployees));
              if (savedSalaryRecords) setSalaryRecords(JSON.parse(savedSalaryRecords));
              if (savedSalaryPayments) setSalaryPayments(JSON.parse(savedSalaryPayments));
              if (savedFabricOrders) setFabricOrders(JSON.parse(savedFabricOrders));
            } catch (e) {
              console.error('localStorage 오류:', e);
              alert('데이터 로드 실패. Chrome을 --allow-file-access-from-files 플래그로 실행하세요.');
            }
          }, []);

          const saveProducts = (data) => {
            setProducts(data);
            try {
              localStorage.setItem('plating_products', JSON.stringify(data));
            } catch (e) {
              console.error('저장 오류:', e);
            }
          };

          const saveHistory = (data) => {
            setHistory(data);
            try {
              localStorage.setItem('plating_history', JSON.stringify(data));
            } catch (e) {
              console.error('저장 오류:', e);
            }
          };

          const saveReceivables = (data) => {
            setReceivables(data);
            try {
              localStorage.setItem('plating_receivables', JSON.stringify(data));
            } catch (e) {
              console.error('저장 오류:', e);
            }
          };

          const saveFabricSuppliers = (data) => {
            setFabricSuppliersState(data);
            try {
              localStorage.setItem('fabric_suppliers', JSON.stringify(data));
            } catch (e) {
              console.error('저장 오류:', e);
            }
          };

          const saveFreelancers = (data) => {
            setFreelancers(data);
            try {
              localStorage.setItem('plating_freelancers', JSON.stringify(data));
            } catch (e) {
              console.error('저장 오류:', e);
            }
          };

          const saveFreelancerWorks = (data) => {
            setFreelancerWorks(data);
            try {
              localStorage.setItem('plating_freelancer_works', JSON.stringify(data));
            } catch (e) {
              console.error('저장 오류:', e);
            }
          };

          const saveEmployees = (data) => {
            setEmployees(data);
            try {
              localStorage.setItem('salary_employees', JSON.stringify(data));
            } catch (e) {
              console.error('저장 오류:', e);
            }
          };

          const saveSalaryRecords = (data) => {
            setSalaryRecords(data);
            try {
              localStorage.setItem('salary_records', JSON.stringify(data));
            } catch (e) {
              console.error('저장 오류:', e);
            }
          };

          const saveSalaryPayments = (data) => {
            setSalaryPayments(data);
            try {
              localStorage.setItem('salary_payments', JSON.stringify(data));
            } catch (e) {
              console.error('저장 오류:', e);
            }
          };

          const handleImageUpload = (e) => {
            const file = e.target.files[0];
            if (file) {
              const reader = new FileReader();
              reader.onloadend = () => {
                setProductForm({...productForm, image: reader.result, imagePreview: reader.result});
              };
              reader.readAsDataURL(file);
            }
          };

          const handleAddProduct = () => {
            if (!productForm.name.trim()) return alert('제품명을 입력하세요');
            const newProduct = {
              id: Date.now(),
              name: productForm.name,
              grindRequired: productForm.grindRequired,
              image: productForm.image,
              platingCosts: productForm.platingCosts,
              grindCost: productForm.grindCost,
              injectionCost: productForm.injectionCost,
              springCost: productForm.springCost,
              pinCost: productForm.pinCost,
              createdAt: new Date().toISOString()
            };
            saveProducts([...products, newProduct]);
            setProductForm({ 
              name: '', 
              grindRequired: true, 
              image: null, 
              imagePreview: null,
              grindCost: '',
              injectionCost: '',
              springCost: '',
              pinCost: '',
              platingCosts: {}
            });
            alert('제품 등록 완료!');
          };

          const handleDeleteProduct = (id) => {
            if (confirm('삭제하시겠습니까?')) {
              saveProducts(products.filter(p => p.id !== id));
            }
          };

          const handleEditProduct = (product) => {
            setEditingProduct(product);
            setProductForm({
              name: product.name,
              grindRequired: product.grindRequired,
              image: product.image,
              imagePreview: product.image,
              platingCosts: product.platingCosts || {},
              grindCost: product.grindCost || '',
              injectionCost: product.injectionCost || '',
              springCost: product.springCost || '',
              pinCost: product.pinCost || ''
            });
          };

          const handleUpdateProduct = () => {
            if (!productForm.name.trim()) return alert('제품명을 입력하세요');
            
            const updatedProducts = products.map(p => 
              p.id === editingProduct.id ? {
                ...p,
                name: productForm.name,
                grindRequired: productForm.grindRequired,
                image: productForm.image,
                platingCosts: productForm.platingCosts,
                grindCost: productForm.grindCost,
                injectionCost: productForm.injectionCost,
                springCost: productForm.springCost,
                pinCost: productForm.pinCost
              } : p
            );
            
            saveProducts(updatedProducts);
            setEditingProduct(null);
            setProductForm({
              name: '', 
              grindRequired: true, 
              image: null, 
              imagePreview: null,
              grindCost: '',
              injectionCost: '',
              springCost: '',
              pinCost: '',
              platingCosts: {}
            });
            alert('제품 수정 완료!');
          };

          const handleAddProductToOrder = (productId) => {
            if (!productId) return alert('제품을 선택하세요');
            
            const product = products.find(p => p.id === productId);
            
            // 이미 추가된 연마 상태 찾기
            const existingGrinds = orderForm.products
              .filter(p => p.productId === productId)
              .map(p => p.grind);
            
            // 사용 가능한 연마 상태 찾기
            const availableGrind = GRIND_OPTIONS.find(g => !existingGrinds.includes(g));
            
            if (!availableGrind) {
              return alert(`"${product.name}"의 모든 연마 상태가 이미 추가되었습니다.`);
            }
            
            // 연마 필요 여부에 따라 기본값 설정
            let defaultGrind = product.grindRequired ? '연마' : '연마 제외';
            const grindToUse = existingGrinds.includes(defaultGrind) ? availableGrind : defaultGrind;
            
            setOrderForm({
              ...orderForm,
              products: [{
                productId: product.id,
                productName: product.name,
                grindRequired: product.grindRequired,
                grind: grindToUse,
                image: product.image,
                items: []
              }, ...orderForm.products]
            });
            
            if (grindToUse !== defaultGrind) {
              alert(`"${product.name} (${defaultGrind})"는 이미 추가되어\n자동으로 "${grindToUse}"로 추가되었습니다.`);
            }
          };

          const handleRemoveProductFromOrder = (productId, grind) => {
            setOrderForm({
              ...orderForm,
              products: orderForm.products.filter(p => !(p.productId === productId && p.grind === grind))
            });
          };

          const updateGrind = (productId, oldGrind, newGrind) => {
            const newProducts = orderForm.products.map(p => {
              if (p.productId === productId && p.grind === oldGrind) {
                return {...p, grind: newGrind};
              }
              return p;
            });
            setOrderForm({ ...orderForm, products: newProducts });
          };

          const handleAddColorItem = (productId, grind) => {
            const newProducts = orderForm.products.map(p => {
              if (p.productId === productId && p.grind === grind) {
                return {...p, items: [...p.items, { color: '대금', finish: '유광', qty: 1 }]};
              }
              return p;
            });
            setOrderForm({ ...orderForm, products: newProducts });
          };

          const handleRemoveColorItem = (productId, grind, itemIndex) => {
            const newProducts = orderForm.products.map(p => {
              if (p.productId === productId && p.grind === grind) {
                return {...p, items: p.items.filter((_, i) => i !== itemIndex)};
              }
              return p;
            });
            setOrderForm({ ...orderForm, products: newProducts });
          };

          const updateColorItem = (productId, grind, itemIndex, field, value) => {
            const newProducts = orderForm.products.map(p => {
              if (p.productId === productId && p.grind === grind) {
                const newItems = [...p.items];
                newItems[itemIndex] = { ...newItems[itemIndex], [field]: value };
                return { ...p, items: newItems };
              }
              return p;
            });
            setOrderForm({ ...orderForm, products: newProducts });
          };

          const handleCreateOrder = () => {
            if (orderForm.products.length === 0) {
              alert('제품을 추가하세요');
              return;
            }
            
            for (const product of orderForm.products) {
              if (product.items.length === 0) {
                alert(`${product.productName} (${product.grind})에 색상을 추가하세요`);
                return;
              }
              
              const colorMap = new Map();
              for (const item of product.items) {
                const colorKey = excelColorName(item.color, item.finish);
                if (colorMap.has(colorKey)) {
                  alert(`${product.productName}에 중복된 색상이 있습니다:\n"${colorKey}"\n\n같은 색상/구분은 수량을 합쳐서 하나로 입력해주세요.`);
                  return;
                }
                colorMap.set(colorKey, true);
              }
            }

            try {
              const existingOrdersOnDate = history.filter(h => h.date === orderForm.date);
              const orderNum = Math.max(0, ...existingOrdersOnDate.map(h => h.orderNum || 0)) + 1;

              const newOrder = {
                id: Date.now(),
                date: orderForm.date,
                orderNum,
                products: orderForm.products.map(product => ({
                  productId: product.productId,
                  productName: product.productName,
                  grind: product.grind,
                  image: product.image,
                  items: product.items.map(item => ({
                    color: item.color,
                    finish: item.finish || '',
                    qty: parseInt(item.qty) || 0,
                    received: false,
                    receivedDate: ''
                  })),
                  total: product.items.reduce((sum, item) => sum + (parseInt(item.qty) || 0), 0)
                })),
                totalQty: orderForm.products.reduce((sum, product) => 
                  sum + product.items.reduce((s, item) => s + (parseInt(item.qty) || 0), 0), 0
                ),
                createdAt: new Date().toISOString()
              };

              const newHistory = [newOrder, ...history];
              saveHistory(newHistory);
              
              setOrderForm({ date: formatDate(new Date()), products: [] });
              
              alert(`${orderNum}차 작업 지시서 생성 완료!`);
              setActiveTab('history');
            } catch (error) {
              console.error('오류:', error);
              alert('작업 지시서 생성 실패. 콘솔을 확인하세요.');
            }
          };

          const handleReceiveItem = (orderId, productIndex, itemIndex) => {
            const newHistory = history.map(order => {
              if (order.id === orderId) {
                const newProducts = [...order.products];
                const newItems = [...newProducts[productIndex].items];
                const currentStatus = newItems[itemIndex].received;
                newItems[itemIndex] = {
                  ...newItems[itemIndex],
                  received: !currentStatus,
                  receivedDate: !currentStatus ? formatDate(new Date()) : ''
                };
                newProducts[productIndex] = { ...newProducts[productIndex], items: newItems };
                return { ...order, products: newProducts };
              }
              return order;
            });
            saveHistory(newHistory);
          };

          const handleDeleteOrder = (orderId) => {
            if (confirm('이 작업 지시서를 삭제하시겠습니까?')) {
              saveHistory(history.filter(h => h.id !== orderId));

                                    platingCost = parseFloat(prod.platingCosts[`${item.color}_${item.finish}`]) || 0;

                      <div className="mb-6">
                        <label className="block text-sm font-semibold text-slate-700 mb-2">엑셀 파일 업로드</label>

                          <div className="border-2 border-dashed border-purple-300 rounded-xl p-8 hover:border-purple-500 hover:bg-purple-50/50 transition-all text-center">

                            <p className="text-xs text-slate-500 mt-1">xls, xlsx 파일 지원</p>
                          </div>
                          <input
                            type="file"
                            accept=".xls,.xlsx"
                            className="hidden"
                            onChange={async (e) => {
                              const file = e.target.files[0];
                              if (!file) return;
                              
                              const employeeId = document.getElementById('excelUploadEmployee').value;
                              const month = document.getElementById('excelUploadMonth').value;
                              
                              if (!employeeId) {
                                alert('직원을 선택하세요');
                                e.target.value = '';
                                return;
                              }
                              
                              if (!month) {
                                alert('대상 연월을 선택하세요');
                                e.target.value = '';
                                return;
                              }
                              
                              const employee = employees.find(emp => emp.id === parseInt(employeeId));
                              if (!employee) {
                                alert('직원 정보를 찾을 수 없습니다');
                                return;
                              }
                              
                              try {
                                // SheetJS 사용하여 엑셀 파싱
                                const reader = new FileReader();
                                reader.onload = async (evt) => {
                                  try {
                                    const data = new Uint8Array(evt.target.result);
                                    const workbook = XLSX.read(data, { type: 'array' });
                                    const sheetName = workbook.SheetNames[0];
                                    const worksheet = workbook.Sheets[sheetName];
                                    const jsonData = XLSX.utils.sheet_to_json(worksheet, { header: 1 });
                                    
                                    // 데이터 파싱
                                    const payments = [];
                                    let headerFound = false;
                                    
                                    for (let i = 0; i < jsonData.length; i++) {
                                      const row = jsonData[i];
                                      
                                      // 헤더 찾기
                                      if (row[0] === '거래일시' || (typeof row[0] === 'string' && row[0].includes('거래일시'))) {
                                        headerFound = true;
                                        continue;
                                      }
                                      
                                      if (!headerFound) continue;
                                      
                                      const dateTimeStr = row[0];
                                      const amount = row[1];
                                      
                                      if (!dateTimeStr || !amount) continue;
                                      
                                      // 날짜 파싱 (시간 제거)
                                      const dateStr = String(dateTimeStr).split(' ')[0]; // "2026.01.08"
                                      const dateParts = dateStr.split('.');
                                      
                                      if (dateParts.length === 3) {
                                        const payDate = `${dateParts[0]}-${dateParts[1].padStart(2, '0')}-${dateParts[2].padStart(2, '0')}`;
                                        
                                        payments.push({
                                          payDate,
                                          amount: parseInt(amount)
                                        });
                                      }
                                    }
                                    
                                    if (payments.length === 0) {
                                      alert('유효한 데이터를 찾을 수 없습니다');
                                      return;
                                    }
                                    
                                    // 총 급여액 계산
                                    const totalAmount = payments.reduce((sum, p) => sum + p.amount, 0);
                                    
                                    const confirmMsg = `${employee.name}님의 ${month} 급여 기록을 등록합니다.\n\n` +
                                      `지급 내역: ${payments.length}건\n` +
                                      `총 지급액: ${totalAmount.toLocaleString()}원\n\n` +
                                      `계속하시겠습니까?`;
                                    
                                    if (!confirm(confirmMsg)) return;
                                    
                                    // 급여 레코드 생성 (이미 있으면 건너뛰기)
                                    let salaryRecord = salaryRecords.find(r => r.employeeId === employee.id && r.month === month);
                                    
                                    if (!salaryRecord) {
                                      salaryRecord = {
                                        id: Date.now(),
                                        employeeId: employee.id,
                                        month,
                                        totalAmount,
                                        breakdown: {
                                          basicAmount: employee.monthlySalary,
                                          insurance: 0,
                                          bonus: totalAmount - employee.monthlySalary,
                                          deduction: 0,
                                          totalAmount,
                                          note: `엑셀 업로드 (${payments.length}건)`
                                        },
                                        createdAt: new Date().toISOString()
                                      };
                                      
                                      saveSalaryRecords([...salaryRecords, salaryRecord]);
                                    }
                                    
                                    // 지급 내역 등록
                                    const newPayments = payments.map((p, idx) => ({
                                      id: Date.now() + idx,
                                      salaryRecordId: salaryRecord.id,
                                      amount: p.amount,
                                      payDate: p.payDate,
                                      paymentOrder: idx + 1,
                                      note: '엑셀 업로드',
                                      createdAt: new Date().toISOString()
                                    }));
                                    
                                    saveSalaryPayments([...salaryPayments, ...newPayments]);
                                    
                                    alert(`✅ ${payments.length}건의 급여 지급 기록이 등록되었습니다!`);
                                    e.target.value = '';
                                    
                                  } catch (err) {
                                    alert('엑셀 파일 파싱 중 오류가 발생했습니다: ' + err.message);
                                    console.error(err);
                                  }
                                };
                                
                                reader.readAsArrayBuffer(file);
                                
                              } catch (err) {
                                alert('파일 읽기 중 오류가 발생했습니다: ' + err.message);
                              }
                            }}
                          />
                        </label>

                          const totalPaid = payments.reduce((sum, p) => sum + p.amount, 0);
                          const overpaid = totalPaid - record.totalAmount;

                            const reportDeadline = new Date(year, month, 10); // month는 0-based이므로 다음달이 됨

                              employee,
                              overpaid,
                              month: record.month,

                              nextReportDate,
                              isOverdue

                                                        const updated = salaryRecords.map(r => 
                                                          r.id === item.record.id 
                                                            ? { ...r, bonusReported: true, bonusReportedAt: new Date().toISOString() }

                                                        saveSalaryRecords(updated);

                                                        e.target.checked = true;

                                          <button
                                            onClick={() => {
                                              if (confirm(`${item.employee.name}님의 ${item.month} 상여금 ${item.overpaid.toLocaleString()}원을 신고 완료 처리하시겠습니까?\n\n이 작업은 급여 기록에 상여금을 추가합니다.`)) {
                                                // 급여 기록 업데이트 - breakdown에 상여금 추가
                                                const updatedRecords = salaryRecords.map(r => {
                                                  if (r.id === item.record.id) {
                                                    return {
                                                      ...r,
                                                      breakdown: {
                                                        ...r.breakdown,
                                                        bonus: item.overpaid,
                                                        note: (r.breakdown?.note || '') + ` [신고완료 ${new Date().toLocaleDateString('ko-KR')}]`
                                                      }
                                                    };
                                                  }
                                                  return r;
                                                });
                                                
                                                saveSalaryRecords(updatedRecords);
                                                alert('✅ 상여금 신고 완료 처리되었습니다!');
                                              }
                                            }}
                                            className="flex-1 bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg font-semibold text-sm transition-all"
                                          >
                                            ✓ 신고 완료 처리
                                          </button>
                                          
                                          <button
                                            onClick={() => {
                                              const newBonus = prompt(`${item.employee.name}님의 ${item.month} 상여금을 직접 입력하세요.\n\n현재 초과 지급액: ${item.overpaid.toLocaleString()}원`, item.overpaid);
                                              
                                              if (newBonus && !isNaN(newBonus)) {
                                                const bonusAmount = parseInt(newBonus);
                                                
                                                const updatedRecords = salaryRecords.map(r => {
                                                  if (r.id === item.record.id) {
                                                    return {
                                                      ...r,
                                                      breakdown: {
                                                        ...r.breakdown,
                                                        bonus: bonusAmount,
                                                        note: (r.breakdown?.note || '') + ` [신고완료 ${new Date().toLocaleDateString('ko-KR')}]`
                                                      }
                                                    };
                                                  }
                                                  return r;
                                                });
                                                
                                                saveSalaryRecords(updatedRecords);
                                                alert(`✅ 상여금 ${bonusAmount.toLocaleString()}원으로 신고 완료 처리되었습니다!`);
                                              }
                                            }}
                                            className="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg font-semibold text-sm transition-all"
                                          >
                                            ✎ 수정 후 처리
                                          </button>
                                        </div>
                                      </div>
                                    );
                                  })}
                                </div>
                                
                                {/* 합산 안내 */}
                                {overdueItems.length > 1 && (
                                  <div className="mt-6 bg-yellow-300 rounded-xl p-4 border-2 border-yellow-500">
                                    <p className="font-bold text-yellow-900 text-center">
                                      📋 다음 신고 시 총 {overdueItems.reduce((s, i) => s + i.overpaid, 0).toLocaleString()}원 합산 신고
                                    </p>
                                  </div>
                                )}
                              </div>
                            )}
                            
                            {/* 당월/이번 신고 예정 */}
                            {upcomingItems.length > 0 && (
                              <div className="bg-orange-100 rounded-2xl p-6 border-2 border-orange-400">
                                <h3 className="text-lg font-bold text-orange-900 mb-4">
                                  📅 이번 신고 예정 ({upcomingItems.length}건)
                                </h3>
                                
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                  {upcomingItems.map((item, idx) => {
                                    const daysUntil = Math.ceil((item.reportDeadline - today) / (1000 * 60 * 60 * 24));
                                    
                                    return (
                                      <div key={idx} className="bg-white rounded-xl p-4 border-l-4 border-orange-500">
                                        <h4 className="font-bold text-slate-900">
                                          {item.employee.name} ({item.employee.position})
                                        </h4>
                                        <p className="text-sm text-slate-600 mt-1">
                                          급여월: {item.month}
                                        </p>
                                        <p className="text-xl font-bold text-orange-600 mt-2">
                                          {item.overpaid.toLocaleString()}원
                                        </p>
                                        <div className="mt-2 bg-orange-50 rounded px-2 py-1">
                                          <p className="text-xs text-orange-700">
                                            신고 기한: {item.reportDeadline.toLocaleDateString('ko-KR')} (D-{daysUntil})
                                          </p>
                                        </div>
                                      </div>
                                    );
                                  })}
                                </div>
                              </div>
                            )}
                          </>
                        );
                      })()}
                    </div>

                    {/* 미지급 현황 */}
                    <div className="bg-gradient-to-br from-red-50 to-orange-50 rounded-3xl shadow-xl border-2 border-red-200 p-8">
                      <h2 className="text-xl font-bold text-red-900 mb-6">⚠️ 미지급 급여 현황</h2>
                      
                      {(() => {
                        const unpaid = salaryRecords.map(r => {
                          const emp = employees.find(e => e.id === r.employeeId);
                          const paid = salaryPayments.filter(p => p.salaryRecordId === r.id).reduce((s, p) => s + p.amount, 0);
                          const rem = r.totalAmount - paid;
                          return { record: r, employee: emp, remaining: rem };
                        }).filter(i => i.remaining > 0);
                        
                        const total = unpaid.reduce((s, i) => s + i.remaining, 0);
                        
                        if (unpaid.length === 0) {
                          return <div className="text-center py-8 text-slate-600"><p className="text-lg font-semibold">✅ 모든 급여 지급 완료!</p></div>;
                        }
                        
                        return (
                          <>
                            <div className="bg-white rounded-2xl p-6 mb-6 border-2 border-red-300">
                              <p className="text-3xl font-bold text-red-600 text-center">{total.toLocaleString()}원</p>
                              <p className="text-center text-slate-600 mt-2">총 미지급액 ({unpaid.length}건)</p>
                            </div>
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                              {unpaid.map(({ record, employee, remaining }) => (
                                <div key={record.id} className="bg-white rounded-xl p-4 border-2 border-orange-200">
                                  <h4 className="font-bold text-slate-900">{employee?.name} ({employee?.position})</h4>
                                  <p className="text-sm text-slate-600">{record.month}</p>
                                  <p className="text-xl font-bold text-red-600 mt-2">{remaining.toLocaleString()}원</p>
                                </div>
                              ))}
                            </div>
                          </>
                        );
                      })()}
                    </div>
                  </div>
                )}

                {/* 중국발주 탭 */}
                {activeMainTab === 'china' && (
                  <div className="bg-white rounded-3xl shadow-xl border border-slate-200/60 p-16 text-center">
                    <div className="flex justify-center mb-4"><Package /></div>
                    <h2 className="text-2xl font-bold text-slate-900 mb-2">중국 발주 관리</h2>
                    <p className="text-slate-500">준비 중입니다</p>
                  </div>
                )}
              </main>

              <footer className="pb-6 text-center text-xs text-slate-400">
                <p>© 2026 LACEROOM통합관리 v20260421.7</p>
              </footer>
            </div>
          </div>
          );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
