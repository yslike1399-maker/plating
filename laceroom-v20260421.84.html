                                  if (colorDef.finishType === 'both') {

                                    platingCost = parseFloat(prod.platingCosts[`${item.color}_${item.finish}`]) || 0;

                              const qty = parseFloat(document.getElementById('itemQty').value) || 0;
                              const unitPrice = parseFloat(document.getElementById('itemUnitPrice').value) || 0;
                              const supplyAmt = parseFloat(document.getElementById('itemSupply').value) || 0;
                              const taxAmt = parseFloat(document.getElementById('itemTax').value) || 0;
                              const payDate = document.getElementById('itemPayDate').value;
                              const payAmt = parseFloat(document.getElementById('itemPayAmt').value) || 0;
                              const memo = document.getElementById('itemMemo').value.trim();
                              const orderCode = document.getElementById('itemOrderCode').value.trim();

                              let updated;
                              if (itemPopup.item) {
                                updated = vendorItems.map(i => i.id === itemPopup.item.id ? {...i, itemDate, desc, vendorDesc, needsReceipt, qty, unitPrice, supplyAmt, taxAmt, payDate, payAmt, memo, orderCode} : i);
                              } else {
                                updated = [...vendorItems, { id: Date.now(), vendorId: itemPopup.vendorId, itemDate, desc, vendorDesc, needsReceipt, received: false, qty, unitPrice, supplyAmt, taxAmt, payDate, payAmt, memo, orderCode, createdAt: new Date().toISOString() }];
                              }
                              setVendorItems(updated);
                              localStorage.setItem('vendor_items', JSON.stringify(updated));
                              setItemPopup(null);
                              alert('저장 완료!');
                            }} className="flex-1 py-3 rounded-xl bg-blue-600 text-white font-bold text-sm">저장</button>
                          </div>
                        </div>
                      </div>
                    )}

                            <span className={`text-xs px-1.5 py-0.5 rounded ${activeVendorTab === v.id ? 'bg-white/20 text-white' : 'bg-slate-200 text-slate-400'}`}>3-{idx+1}</span>
                            {v.name}
                            <span className={`text-xs px-1.5 py-0.5 rounded-full ${v.type === 'monthly' ? 'bg-blue-100 text-blue-600' : 'bg-amber-100 text-amber-600'} ${activeVendorTab === v.id ? 'bg-white/30 text-white' : ''}`}>

                            </span>
                          </button>

                          <Plus /> 거래처 추가

                          </div>
                          <div className="flex gap-2">
                            {vendor.type === 'monthly' && (
                              <button onClick={() => setBillPopup({ vendorId: vendor.id })}

                              <button onClick={() => setItemPopup({ vendorId: vendor.id })}

                            const paid = vendorPayments.filter(p => p.billId === b.id).reduce((ss,p) => ss+p.amount, 0);

                                const billTotal = bill.supplyAmt + bill.taxAmt;
                                const payments = vendorPayments.filter(p => p.billId === bill.id).sort((a,b) => a.payDate.localeCompare(b.payDate));
                                const totalPaid = payments.reduce((s,p) => s+p.amount, 0);
                                const balance = bill.carryOver + billTotal - totalPaid;
                                const isPaid = balance <= 0;

                                  <div key={bill.id} className={`bg-white rounded-2xl border-2 overflow-hidden ${isPaid ? 'border-green-300' : 'border-slate-200'}`}>

                                        {bill.memo && <span className="text-xs text-slate-400">{bill.memo}</span>}

                                              setVendorBills(updated);
                                              localStorage.setItem('vendor_bills', JSON.stringify(updated));

                                        </label>
                                      </div>
                                      <div className="flex gap-2 shrink-0">

                                        <button onClick={() => { if(confirm('삭제하시겠습니까?')) { const u=vendorBills.filter(b=>b.id!==bill.id); setVendorBills(u); localStorage.setItem('vendor_bills',JSON.stringify(u)); }}}

                                      </div>

                                          <div className="font-bold text-slate-700">{bill.carryOver.toLocaleString()}원</div>
                                        </div>
                                        <div className="bg-blue-50 rounded-xl p-3">
                                          <div className="text-xs text-slate-400 mb-1">공급가액</div>
                                          <div className="font-bold text-blue-700">{bill.supplyAmt.toLocaleString()}원</div>
                                        </div>
                                        <div className="bg-slate-50 rounded-xl p-3">
                                          <div className="text-xs text-slate-400 mb-1">세액</div>
                                          <div className="font-bold text-slate-600">{bill.taxAmt.toLocaleString()}원</div>
                                        </div>
                                        <div className="bg-orange-50 rounded-xl p-3">
                                          <div className="text-xs text-slate-400 mb-1">청구합계</div>

                                      </div>

                                        <div className="border-t border-slate-100 pt-3">
                                          <div className="text-xs font-semibold text-slate-500 mb-2">지급 내역 ({payments.length}차)</div>

                                            {payments.map((p, idx) => (
                                              <div key={p.id} className="flex items-center justify-between bg-green-50 rounded-lg px-3 py-2 text-xs">
                                                <span className="text-slate-500 font-medium">{idx+1}차 · {p.payDate}</span>
                                                <span className="font-bold text-green-700">{p.amount.toLocaleString()}원</span>
                                                {p.memo && <span className="text-slate-400">{p.memo}</span>}
                                                <button onClick={() => { if(confirm('삭제?')){ const u=vendorPayments.filter(x=>x.id!==p.id); setVendorPayments(u); localStorage.setItem('vendor_payments',JSON.stringify(u)); }}} className="text-red-400 hover:text-red-600 ml-2">✕</button>
                                              </div>
                                            ))}
                                          </div>
                                          <div className="flex justify-between mt-2 text-xs font-bold px-1">
                                            <span className="text-slate-500">실결제 합계</span>
                                            <span className="text-green-600">{totalPaid.toLocaleString()}원</span>
                                          </div>
                                        </div>
                                      )}

                                        <span className="text-sm font-bold text-slate-700">미수잔액</span>
                                        <span className={`text-lg font-bold ${balance > 0 ? 'text-red-600' : 'text-green-600'}`}>{balance.toLocaleString()}원</span>
                                      </div>
                                    </div>
                                  </div>
                                );
                              })}
                            </div>
                          );
                        })()}

                            <div className="space-y-3">

                                        <th className="text-right py-3 px-4 text-xs font-semibold text-slate-600">단가</th>
                                        <th className="text-right py-3 px-4 text-xs font-semibold text-slate-600">공급가액</th>
                                        <th className="text-right py-3 px-4 text-xs font-semibold text-slate-600">세액</th>
                                        <th className="text-right py-3 px-4 text-xs font-semibold text-slate-600">합계</th>
                                        <th className="text-left py-3 px-4 text-xs font-semibold text-slate-600">지급일</th>
                                        <th className="text-right py-3 px-4 text-xs font-semibold text-slate-600">지급액</th>
                                        <th className="text-right py-3 px-4 text-xs font-semibold text-slate-600">잔액</th>

                                            <td className="py-3 px-4 text-sm font-bold text-amber-700 font-mono">{item.vendorDesc||'-'}</td>
                                            <td className="py-3 px-4 text-right text-slate-600 text-xs">{item.qty||'-'}</td>
                                            <td className="py-3 px-4 text-right text-slate-600 text-xs">{item.unitPrice?item.unitPrice.toLocaleString():'-'}</td>
                                            <td className="py-3 px-4 text-right text-xs">{item.supplyAmt.toLocaleString()}</td>
                                            <td className="py-3 px-4 text-right text-slate-500 text-xs">{item.taxAmt.toLocaleString()}</td>
                                            <td className="py-3 px-4 text-right font-bold text-blue-600 text-xs">{total.toLocaleString()}</td>
                                            <td className="py-3 px-4 text-slate-500 text-xs">{item.payDate||'-'}</td>
                                            <td className="py-3 px-4 text-right text-green-600 text-xs">{(item.payAmt||0).toLocaleString()}</td>
                                            <td className={`py-3 px-4 text-right font-bold text-xs ${balance>0?'text-red-500':'text-green-600'}`}>{balance.toLocaleString()}</td>
                                            {/* 입고 체크 */}
                                            <td className="py-3 px-4 text-center">
                                              {item.needsReceipt ? (
                                                <label className="flex flex-col items-center gap-0.5 cursor-pointer">
                                                  <input type="checkbox"
                                                    checked={item.received || false}
                                                    onChange={e => {
                                                      const updated = vendorItems.map(i => i.id === item.id ? {...i, received: e.target.checked, receivedDate: e.target.checked ? new Date().toISOString().split('T')[0] : ''} : i);
                                                      setVendorItems(updated);
                                                      localStorage.setItem('vendor_items', JSON.stringify(updated));
                                                    }}
                                                    className="w-4 h-4 accent-green-500"
                                                  />
                                                  {item.received
                                                    ? <span className="text-xs text-green-600 font-semibold whitespace-nowrap">{item.receivedDate}</span>
                                                    : <span className="text-xs text-orange-400 font-semibold">미입고</span>
                                                  }
                                                </label>
                                              ) : (
                                                <span className="text-xs text-slate-200">-</span>
                                              )}
                                            </td>
                                            {/* 발주코드 */}
                                            <td className="py-3 px-4 text-center">
                                              {item.orderCode ? (
                                                <button onClick={() => alert(item.orderCode)}
                                                  className="text-xs bg-amber-100 text-amber-700 px-2 py-1 rounded-lg hover:bg-amber-200 font-mono">
                                                  📋 보기
                                                </button>
                                              ) : <span className="text-slate-300 text-xs">-</span>}
                                            </td>
                                            <td className="py-3 px-4 text-center">
                                              <label className="flex flex-col items-center gap-0.5 cursor-pointer">
                                                <input type="checkbox"
                                                  checked={item.taxInvoiceReceived || false}
                                                  onChange={e => {
                                                    const updated = vendorItems.map(i => i.id === item.id
                                                      ? {...i, taxInvoiceReceived: e.target.checked, taxInvoiceDate: e.target.checked ? new Date().toISOString().split('T')[0] : ''}
                                                      : i);
                                                    setVendorItems(updated);
                                                    localStorage.setItem('vendor_items', JSON.stringify(updated));
                                                  }}
                                                  className="w-4 h-4 accent-purple-600"
                                                />
                                                {item.taxInvoiceReceived
                                                  ? <span className="text-xs text-purple-600 font-semibold whitespace-nowrap">{item.taxInvoiceDate}</span>
                                                  : <span className="text-xs text-slate-300">미수령</span>
                                                }
                                              </label>
                                            </td>
                                            <td className="py-3 px-4 text-center">
                                              <div className="flex gap-1 justify-center">
                                                <button onClick={() => setItemPopup({ vendorId: vendor.id, item })} className="text-blue-500 hover:bg-blue-50 p-1 rounded"><Edit /></button>

                                              </div>
                                            </td>
                                          </tr>
                                        );
                                      })}
                                    </tbody>
                                  </table>
                                </div>
                              )}
                            </div>
                          );

                      </div>

                  <div className="space-y-6">

                    {/* 원단 수정 팝업 */}
                    {editFabric && (
                      <div className="fixed inset-0 z-50 flex items-center justify-center" style={{background:'rgba(0,0,0,0.5)'}}>

                          </div>

                              <label className="block text-xs font-semibold text-slate-600 mb-1">원단명</label>

                      const calc = (w, h) => {
                        if (!w || !h || effectiveH <= 0 || effectiveW <= 0) return null;
                        const stackH = h * f.stackCount;
                        const verticalStacks = Math.floor(effectiveH / stackH);
                        const horizontalCount = Math.floor(effectiveW / w);
                        const totalCount = verticalStacks * f.stackCount * horizontalCount;
                        return { verticalStacks, horizontalCount, totalCount, stackH };
                      };

                      const largeCalc = f.useLarge ? calc(f.largeW, f.largeH) : null;

                                                  document.getElementById(`pay_${record.id}`).value='';

                                                if(over>0 && r.bonusReported){ carryOverBonus=Math.max(0,carryOverBonus-over); carryDetails.push({month:r.month,amount:over,reported:true}); }

                                              const thisBonusOverpaid=Math.max(0,totalPaid-emp.monthlySalary);

                              }} className="flex-1 py-3 rounded-xl bg-rose-500 hover:bg-rose-600 text-white font-bold text-sm">저장</button>
                            </div>
                          </div>
                        </div>

                            <div className="flex flex-wrap gap-2 mb-3">
                              {(fixedExpenseTab==='life'?expenseCategories:bizCategories).map(c=>(

                      {/* ───── 생활비 탭 ───── */}
                      {fixedExpenseTab === 'life' && (() => {
                        const list = fixedExpenses.sort((a,b)=>a.payDay-b.payDay);
                        const total = list.reduce((s,e)=>s+e.amount,0);
                        const today = new Date(); today.setHours(0,0,0,0);

                        // AI 분석 (규칙 기반)
                        const analysis = [];
                        // 결제일 밀집 분석
                        const dayGroups = {};
                        list.forEach(e=>{ if(!dayGroups[e.payDay]) dayGroups[e.payDay]=[]; dayGroups[e.payDay].push(e); });
                        Object.entries(dayGroups).forEach(([day,items])=>{
                          if(items.length>=2){
                            const dayTotal = items.reduce((s,e)=>s+e.amount,0);
                            analysis.push({ type:'warn', msg:`📅 ${day}일에 ${items.length}건(${dayTotal.toLocaleString()}원)이 집중되어 있습니다. 일부를 분산하면 자금 관리가 수월해집니다.` });
                          }
                        });
                        // 월말 집중 (25일 이후)
                        const lateMonth = list.filter(e=>e.payDay>=25);
                        if(lateMonth.length>=3){
                          analysis.push({ type:'warn', msg:`⚠️ 월말(25일 이후)에 ${lateMonth.length}건이 몰려 있습니다. 월초/중순으로 일부 이전을 검토해보세요.` });
                        }
                        // 고액 경고 (100만원 이상)
                        list.forEach(e=>{
                          if(e.amount>=1000000) analysis.push({ type:'danger', msg:`🚨 [${e.category}] ${e.content} ${e.amount.toLocaleString()}원 — 월 100만원 이상의 고액 지출입니다. 재검토를 권장합니다.` });
                        });
                        // 전체 합계 경고
                        if(total>=3000000) analysis.push({ type:'danger', msg:`🚨 생활비 고정지출 합계가 ${total.toLocaleString()}원으로 월 300만원을 초과합니다. 지출 구조 점검이 필요합니다.` });
                        // 분산 제안
                        const earlyCount = list.filter(e=>e.payDay<=10).length;
                        const midCount = list.filter(e=>e.payDay>10&&e.payDay<25).length;
                        const lateCount = list.filter(e=>e.payDay>=25).length;
                        if(lateCount > earlyCount+midCount && list.length>=3){
                          analysis.push({ type:'info', msg:`💡 결제일 분포: 초순(${earlyCount}건) / 중순(${midCount}건) / 월말(${lateCount}건). 월말 편중이 심합니다. 초·중순으로 분산하면 현금흐름이 안정됩니다.` });
                        }
                        if(analysis.length===0 && list.length>0) analysis.push({ type:'good', msg:'✅ 결제일이 잘 분산되어 있습니다. 자금 흐름이 안정적으로 보입니다.' });

                        return (
                          <>
                            {/* 헤더 */}
                            <div className="flex items-center justify-between flex-wrap gap-2">
                              <div>
                                <span className="font-semibold text-slate-700">생활비 고정지출</span>
                                <span className="ml-2 text-sm text-rose-600 font-bold">월 {total.toLocaleString()}원</span>
                              </div>
                              <div className="flex gap-2">
                                <button onClick={() => setAddCategoryPopup(true)} className="px-3 py-2 bg-slate-200 hover:bg-slate-300 text-slate-700 rounded-xl text-xs font-bold">⚙ 항목</button>
                                <button onClick={() => setFixedExpensePopup(true)} className="px-4 py-2 bg-rose-500 hover:bg-rose-600 text-white rounded-xl text-sm font-bold">+ 등록</button>
                              </div>
                            </div>

                            {/* AI 분석 */}
                            {analysis.length>0 && list.length>0 && (
                              <div className="space-y-2">
                                {analysis.map((a,i)=>(
                                  <div key={i} className={`rounded-xl px-4 py-3 text-sm border-l-4 ${a.type==='danger'?'bg-red-50 border-red-500 text-red-700':a.type==='warn'?'bg-amber-50 border-amber-400 text-amber-700':a.type==='good'?'bg-green-50 border-green-400 text-green-700':'bg-blue-50 border-blue-400 text-blue-700'}`}>
                                    {a.msg}
                                  </div>
                                ))}
                              </div>
                            )}

                            {/* 카테고리 요약 */}
                            {list.length>0 && (
                              <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
                                {expenseCategories.map(cat=>{
                                  const items=list.filter(e=>e.category===cat);
                                  if(!items.length) return null;
                                  return <div key={cat} className="bg-white rounded-2xl border border-slate-200 p-4 text-center">
                                    <div className="text-xs text-slate-400 mb-1">{cat}</div>
                                    <div className="font-bold text-slate-900 text-sm">{items.reduce((s,e)=>s+e.amount,0).toLocaleString()}원</div>
                                    <div className="text-xs text-slate-400">{items.length}건</div>
                                  </div>;
                                })}
                              </div>
                            )}

                            {/* 가로 막대그래프 */}
                            {list.length>0 && (() => {
                              const catData = (fixedExpenseTab==='life'?expenseCategories:bizCategories).map(cat => {
                                const items = list.filter(e=>e.category===cat);
                                if(!items.length) return null;
                                return { cat, total: items.reduce((s,e)=>s+e.amount,0), count: items.length };
                              }).filter(Boolean).sort((a,b)=>b.total-a.total);
                              const maxTotal = Math.max(...catData.map(d=>d.total),1);
                              const grandTotal = catData.reduce((s,d)=>s+d.total,0);
                              const colors = fixedExpenseTab==='life'
                                ? ['#ef4444','#f97316','#eab308','#22c55e','#3b82f6','#8b5cf6','#ec4899','#14b8a6']
                                : ['#3b82f6','#8b5cf6','#22c55e','#f97316','#ef4444','#14b8a6','#eab308','#ec4899'];
                              const catIcons = {'카드':'💳','보험료':'🛡️','자동차':'🚗','대출이자':'🏦','통신비':'📱','임대료':'🏠','리스/렌탈':'🔑','구독서비스':'📺'};
                              return (
                                <div className="bg-white rounded-2xl border border-slate-200 p-5">
                                  <div className="text-xs font-semibold text-slate-500 mb-4">📊 항목별 지출 비중</div>
                                  <div className="space-y-3">
                                    {catData.map((d,i) => {
                                      const pct = Math.round(d.total/grandTotal*100);

                                      const color = colors[i%colors.length];
                                      const icon = catIcons[d.cat]||'💰';

                                        <div key={d.cat}>
                                          <div className="flex items-center justify-between mb-1">
                                            <span className="text-sm font-semibold text-slate-700 flex items-center gap-1.5">

                                            <div className="flex items-center gap-2">
                                              <span className="text-sm font-bold text-slate-900">{d.total.toLocaleString()}원</span>
                                              <span className="text-xs font-bold px-1.5 py-0.5 rounded-full text-white" style={{background:color,minWidth:36,textAlign:'center'}}>{pct}%</span>

                                          <div className="w-full bg-slate-100 rounded-full overflow-hidden" style={{height:18}}>
                                            <div style={{width:barW+'%',height:'100%',background:color,borderRadius:'9999px',transition:'width 0.5s ease',display:'flex',alignItems:'center',justifyContent:'flex-end',paddingRight:6}}>
                                              {barW>20 && <span style={{color:'white',fontSize:10,fontWeight:700}}>{Math.round(d.total/10000)}만</span>}
                                            </div>
                                          </div>
                                        </div>
                                      );
                                    })}
                                  </div>
                                  <div className="mt-4 pt-3 border-t border-slate-100 flex justify-between text-xs text-slate-500">
                                    <span>총 {catData.length}개 항목</span>
                                    <span className="font-bold text-slate-700">월 합계 {grandTotal.toLocaleString()}원</span>
                                  </div>
                                </div>
                              );
                            })()}

                            {/* 테이블 */}
                            {list.length===0 ? (
                              <div className="bg-white rounded-2xl border border-slate-200 p-12 text-center text-slate-400">
                                <div className="text-4xl mb-3">💳</div><p>등록된 생활비 고정지출이 없습니다</p>
                              </div>
                            ) : (
                              <div className="bg-white rounded-2xl border border-slate-200 overflow-hidden">
                                <table className="w-full text-sm">
                                  <thead className="bg-slate-50 border-b border-slate-200">

                                      <th className="text-left py-3 px-4 text-xs font-semibold text-slate-600">항목</th>
                                      <th className="text-left py-3 px-4 text-xs font-semibold text-slate-600">내용</th>
                                      <th className="text-right py-3 px-4 text-xs font-semibold text-slate-600">금액</th>
                                      <th className="text-center py-3 px-4 text-xs font-semibold text-slate-600">결제일</th>
                                      <th className="text-center py-3 px-4 text-xs font-semibold text-slate-600">D-day</th>
                                      <th className="text-left py-3 px-4 text-xs font-semibold text-slate-600">비고</th>
                                      <th className="text-center py-3 px-4 text-xs font-semibold text-slate-600">관리</th>
                                    </tr>
                                  </thead>
                                  <tbody>
                                    {list.map((expense,idx)=>{
                                      const thisMonth=new Date(today.getFullYear(),today.getMonth(),expense.payDay);
                                      const diff=Math.ceil((thisMonth-today)/(1000*60*60*24));
                                      const isUrgent=diff>=0&&diff<=2; const isWarning=diff>=0&&diff<=5;
                                      return (
                                        <tr key={expense.id} className={`border-b border-slate-100 ${idx%2===0?'bg-white':'bg-slate-50'} ${isUrgent?'!bg-red-50':''} hover:bg-rose-50`}>
                                          <td className="py-3 px-4"><span className="bg-rose-100 text-rose-600 text-xs px-2 py-0.5 rounded-full font-semibold">
                                            {expense.category==='카드'?'💳':expense.category==='보험료'?'🛡️':expense.category==='자동차'?'🚗':expense.category==='대출이자'?'🏦':expense.category==='통신비'?'📱':expense.category==='임대료'?'🏠':expense.category==='리스/렌탈'?'🔑':expense.category==='구독서비스'?'📺':'💰'} {expense.category}
                                          </span></td>
                                          <td className="py-3 px-4 font-medium text-slate-900">{expense.content}</td>
                                          <td className={`py-3 px-4 text-right font-bold ${expense.amount>=1000000?'text-red-600':'text-slate-800'}`}>{expense.amount.toLocaleString()}원{expense.amount>=1000000&&<span className="ml-1 text-xs">🚨</span>}</td>
                                          <td className="py-3 px-4 text-center text-slate-600">매월 {expense.payDay}일</td>
                                          <td className="py-3 px-4 text-center">
                                            {diff<0?<span className="text-xs text-slate-300">완료</span>
                                              :<span className={`text-xs font-bold px-2 py-0.5 rounded-full ${isUrgent?'bg-red-100 text-red-600':isWarning?'bg-amber-100 text-amber-600':'bg-slate-100 text-slate-500'}`}>{diff===0?'오늘!':`D-${diff}`}</span>}
                                          </td>
                                          <td className="py-3 px-4 text-xs text-slate-400">{expense.note||'-'}</td>
                                          <td className="py-3 px-4 text-center">
                                            <div className="flex gap-1 justify-center">
                                              <button onClick={()=>setEditExpensePopup({...expense,_type:'life'})} className="p-1.5 text-blue-500 hover:bg-blue-50 rounded-lg"><Edit /></button>
                                              <button onClick={()=>{if(confirm('삭제?'))saveFixedExpenses(fixedExpenses.filter(e=>e.id!==expense.id));}} className="p-1.5 text-red-400 hover:bg-red-50 rounded-lg"><Trash /></button>
                                            </div>
                                          </td>
                                        </tr>
                                      );
                                    })}
                                  </tbody>
                                </table>
                              </div>
                            )}
                          </>
                        );
                      })()}

                      {/* ───── 사업 고정지출 탭 ───── */}
                      {fixedExpenseTab === 'biz' && (() => {
                        const list = bizExpenses.sort((a,b)=>a.payDay-b.payDay);
                        const total = list.reduce((s,e)=>s+e.amount,0);
                        const today = new Date(); today.setHours(0,0,0,0);

                        // AI 분석
                        const analysis = [];
                        const dayGroups = {};
                        list.forEach(e=>{ if(!dayGroups[e.payDay]) dayGroups[e.payDay]=[]; dayGroups[e.payDay].push(e); });
                        Object.entries(dayGroups).forEach(([day,items])=>{
                          if(items.length>=2){
                            const dayTotal=items.reduce((s,e)=>s+e.amount,0);
                            analysis.push({type:'warn',msg:`📅 ${day}일에 ${items.length}건(${dayTotal.toLocaleString()}원)이 집중되어 있습니다.`});
                          }
                        });
                        list.forEach(e=>{
                          if(e.amount>=2000000) analysis.push({type:'danger',msg:`🚨 [${e.category}] ${e.content} ${e.amount.toLocaleString()}원 — 사업 고정비 중 고액 항목입니다. 협상 또는 대안 검토를 권장합니다.`});
                        });
                        if(total>=5000000) analysis.push({type:'danger',msg:`🚨 사업 고정지출 합계 ${total.toLocaleString()}원 — 월 500만원 초과. 매출 대비 고정비 비율을 점검하세요.`});
                        const lateCount=list.filter(e=>e.payDay>=25).length;
                        if(lateCount>=3) analysis.push({type:'warn',msg:`⚠️ 월말(25일 이후)에 ${lateCount}건 집중. 거래처와 결제일 협의를 통해 분산을 검토하세요.`});
                        if(analysis.length===0&&list.length>0) analysis.push({type:'good',msg:'✅ 사업 고정지출이 안정적으로 분산되어 있습니다.'});

                        return (
                          <>
                            <div className="flex items-center justify-between flex-wrap gap-2">
                              <div>
                                <span className="font-semibold text-slate-700">사업 고정지출</span>
                                <span className="ml-2 text-sm text-blue-600 font-bold">월 {total.toLocaleString()}원</span>
                              </div>
                              <div className="flex gap-2">
                                <button onClick={()=>setAddCategoryPopup(true)} className="px-3 py-2 bg-slate-200 hover:bg-slate-300 text-slate-700 rounded-xl text-xs font-bold">⚙ 항목</button>
                                <button onClick={()=>setFixedExpensePopup(true)} className="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-xl text-sm font-bold">+ 등록</button>
                              </div>
                            </div>

                            {analysis.length>0&&list.length>0&&(
                              <div className="space-y-2">
                                {analysis.map((a,i)=>(
                                  <div key={i} className={`rounded-xl px-4 py-3 text-sm border-l-4 ${a.type==='danger'?'bg-red-50 border-red-500 text-red-700':a.type==='warn'?'bg-amber-50 border-amber-400 text-amber-700':a.type==='good'?'bg-green-50 border-green-400 text-green-700':'bg-blue-50 border-blue-400 text-blue-700'}`}>
                                    {a.msg}
                                  </div>
                                ))}
                              </div>
                            )}

                            {list.length===0?(
                              <div className="bg-white rounded-2xl border border-slate-200 p-12 text-center text-slate-400">
                                <div className="text-4xl mb-3">🏢</div><p>등록된 사업 고정지출이 없습니다</p>
                              </div>
                            ):(
                              <>
                                <div className="bg-white rounded-2xl border border-slate-200 overflow-hidden">
                                <table className="w-full text-sm">
                                  <thead className="bg-slate-50 border-b border-slate-200">
                                    <tr>
                                      <th className="text-left py-3 px-4 text-xs font-semibold text-slate-600">항목</th>
                                      <th className="text-left py-3 px-4 text-xs font-semibold text-slate-600">내용</th>
                                      <th className="text-right py-3 px-4 text-xs font-semibold text-slate-600">금액</th>
                                      <th className="text-center py-3 px-4 text-xs font-semibold text-slate-600">결제일</th>
                                      <th className="text-center py-3 px-4 text-xs font-semibold text-slate-600">D-day</th>
                                      <th className="text-left py-3 px-4 text-xs font-semibold text-slate-600">비고</th>
                                      <th className="text-center py-3 px-4 text-xs font-semibold text-slate-600">관리</th>
                                    </tr>
                                  </thead>
                                  <tbody>
                                    {list.map((expense,idx)=>{
                                      const thisMonth=new Date(today.getFullYear(),today.getMonth(),expense.payDay);
                                      const diff=Math.ceil((thisMonth-today)/(1000*60*60*24));
                                      const isUrgent=diff>=0&&diff<=2; const isWarning=diff>=0&&diff<=5;
                                      return (
                                        <tr key={expense.id} className={`border-b border-slate-100 ${idx%2===0?'bg-white':'bg-slate-50'} hover:bg-blue-50`}>
                                          <td className="py-3 px-4"><span className="bg-blue-100 text-blue-600 text-xs px-2 py-0.5 rounded-full font-semibold">
                                            {expense.category==='카드'?'💳':expense.category==='보험료'?'🛡️':expense.category==='자동차'?'🚗':expense.category==='대출이자'?'🏦':expense.category==='통신비'?'📱':expense.category==='임대료'?'🏠':expense.category==='리스/렌탈'?'🔑':expense.category==='구독서비스'?'📺':'💰'} {expense.category}
                                          </span></td>
                                          <td className="py-3 px-4 font-medium text-slate-900">{expense.content}</td>
                                          <td className={`py-3 px-4 text-right font-bold ${expense.amount>=2000000?'text-red-600':'text-slate-800'}`}>{expense.amount.toLocaleString()}원{expense.amount>=2000000&&<span className="ml-1 text-xs">🚨</span>}</td>
                                          <td className="py-3 px-4 text-center text-slate-600">매월 {expense.payDay}일</td>
                                          <td className="py-3 px-4 text-center">
                                            {diff<0?<span className="text-xs text-slate-300">완료</span>
                                              :<span className={`text-xs font-bold px-2 py-0.5 rounded-full ${isUrgent?'bg-red-100 text-red-600':isWarning?'bg-amber-100 text-amber-600':'bg-slate-100 text-slate-500'}`}>{diff===0?'오늘!':`D-${diff}`}</span>}
                                          </td>
                                          <td className="py-3 px-4 text-xs text-slate-400">{expense.note||'-'}</td>
                                          <td className="py-3 px-4 text-center">
                                            <div className="flex gap-1 justify-center">
                                              <button onClick={()=>setEditExpensePopup({...expense,_type:'biz'})} className="p-1.5 text-blue-500 hover:bg-blue-50 rounded-lg"><Edit /></button>
                                              <button onClick={()=>{if(confirm('삭제?'))saveBizExpenses(bizExpenses.filter(e=>e.id!==expense.id));}} className="p-1.5 text-red-400 hover:bg-red-50 rounded-lg"><Trash /></button>
                                            </div>
                                          </td>
                                        </tr>
                                      );
                                    })}
                                  </tbody>
                                </table>
                              </div>
                            </>
                            )}
                          </>
                        );
                      })()}
                    </div>
                  </div>
                )}



                {/* 지원사업 탭 */}
                {activeMainTab === 'subsidy' && (
                  <div className="flex-1 px-6 py-8">
                    <div className="space-y-5">

                      {/* 헤더 */}
                      <div className="flex items-center justify-between flex-wrap gap-2">
                        <div>
                          <h1 className="text-2xl font-bold text-slate-900">🏛️ 정부/지자체 지원사업</h1>
                          <p className="text-xs text-slate-400 mt-0.5">경기도 양주시 · 제조업 · 기업마당(bizinfo.go.kr) 실시간 연동</p>
                        </div>
                        <button onClick={fetchSubsidy}
                          className="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-xl text-sm font-bold">
                          🔄 새로고침
                        </button>
                      </div>

                      {/* AI 분석 섹션 */}
                      <div className="bg-gradient-to-r from-blue-50 to-indigo-50 rounded-2xl border border-blue-200 p-5">
                        <div className="flex items-center justify-between mb-2">
                          <div className="flex items-center gap-2">
                            <span className="text-lg">🤖</span>
                            <span className="font-bold text-slate-800 text-sm">AI 맞춤 추천 분석</span>
                            <span className="text-xs text-slate-400">경기도 양주시 · 정밀금속 제조업 기준</span>
                          </div>
                          <button onClick={getAiAnalysis} disabled={aiLoading || subsidyItems.length===0}
                            className="px-3 py-1.5 bg-blue-600 hover:bg-blue-700 disabled:bg-slate-300 text-white rounded-xl text-xs font-bold">
                            {aiLoading ? '분석중...' : '✨ AI 분석 실행'}
                          </button>
                        </div>
                        {aiSummary ? (
                          <div className="bg-white rounded-xl p-4 text-sm text-slate-700 whitespace-pre-wrap leading-relaxed border border-blue-100">{aiSummary}</div>
                        ) : (
                          <p className="text-xs text-slate-400">목록 로딩 후 AI 분석 버튼을 클릭하면 우리 회사에 맞는 지원사업을 추천해드립니다.</p>
                        )}
                      </div>

                      {/* 필터 */}
                      <div className="flex flex-wrap gap-3">
                        <div className="flex gap-1 flex-wrap items-center">
                          <span className="text-xs text-slate-500 font-semibold mr-1">분야:</span>
                          {['전체','금융','기술','인력','수출','내수','창업','경영','제조','기타'].map(c=>(
                            <button key={c} onClick={()=>setSubsidyFilter(c)}
                              className={`px-3 py-1 rounded-full text-xs font-semibold transition-all ${subsidyFilter===c?'bg-blue-600 text-white':'bg-slate-100 text-slate-600 hover:bg-slate-200'}`}>
                              {c}
                            </button>
                          ))}
                        </div>
                        <div className="flex gap-1 flex-wrap items-center">
                          <span className="text-xs text-slate-500 font-semibold mr-1">지역:</span>
                          {['전체','정부(중앙부처)','경기도','양주시'].map(r=>(
                            <button key={r} onClick={()=>setRegionFilter(r)}
                              className={`px-3 py-1 rounded-full text-xs font-semibold transition-all ${regionFilter===r?'bg-green-600 text-white':'bg-slate-100 text-slate-600 hover:bg-slate-200'}`}>
                              {r}
                            </button>
                          ))}
                        </div>
                      </div>

                      {/* 상태바 */}
                      {(() => {
                        const filtered = subsidyItems.filter(item => {
                          const catOk = subsidyFilter==='전체' || item.category?.includes(subsidyFilter);
                          const regOk = regionFilter==='전체' || item.region===regionFilter;
                          return catOk && regOk;
                        });
                        const getDdayColor = (d) => {
                          if (d===null) return 'bg-slate-100 text-slate-400';
                          if (d<0) return 'bg-slate-100 text-slate-300';
                          if (d<=7) return 'bg-red-100 text-red-600';
                          if (d<=14) return 'bg-amber-100 text-amber-600';
                          return 'bg-green-100 text-green-600';
                        };
                        return (
                          <>
                            <div className="flex items-center justify-between text-xs text-slate-400">
                              <span>총 {filtered.length}건 {subsidyItems.length>0&&`(전체 ${subsidyItems.length}건)`}</span>
                              {lastUpdated && <span>마지막 업데이트: {lastUpdated}</span>}
                            </div>

                            {subsidyLoading && (
                              <div className="bg-white rounded-2xl border border-slate-200 p-12 text-center">
                                <div className="text-3xl mb-3">⏳</div>
                                <p className="text-slate-500 font-medium">🔍 지원사업 검색 중... (20~30초 소요)</p><p className="text-xs text-slate-400 mt-2">Claude AI가 경기도·양주시·중소기업부 지원사업을 웹검색하고 있습니다</p>
                              </div>
                            )}
                            {subsidyError && !subsidyLoading && (
                              <div className="bg-red-50 rounded-2xl border border-red-200 p-6 text-center">
                                <p className="text-red-600 text-sm font-medium">{subsidyError}</p>
                                <button onClick={fetchSubsidy} className="mt-3 px-4 py-2 bg-red-500 text-white rounded-xl text-xs font-bold">다시 시도</button>
                              </div>
                            )}
                            {!subsidyLoading && !subsidyError && (
                              <div className="space-y-3">
                                {filtered.length===0 && (
                                  <div className="bg-white rounded-2xl border border-slate-200 p-12 text-center text-slate-400">
                                    <div className="text-3xl mb-2">📭</div>
                                    <p>해당하는 지원사업이 없습니다</p>
                                  </div>
                                )}
                                {filtered.map((item, idx) => (
                                  <div key={idx} className={`bg-white rounded-2xl border-2 p-5 hover:shadow-md transition-all ${item.dday!==null&&item.dday<=7&&item.dday>=0?'border-red-200':'border-slate-200'}`}>
                                    <div className="flex items-start justify-between gap-3 flex-wrap">
                                      <div className="flex-1 min-w-0">
                                        <div className="flex items-center gap-2 mb-1 flex-wrap">
                                          {item.category && <span className="text-xs bg-blue-100 text-blue-600 px-2 py-0.5 rounded-full font-semibold">{item.category}</span>}
                                          <span className={`text-xs px-2 py-0.5 rounded-full font-semibold ${item.region==='양주시'?'bg-green-100 text-green-600':item.region==='경기도'?'bg-teal-100 text-teal-600':'bg-slate-100 text-slate-500'}`}>{item.region}</span>
                                          {item.org && <span className="text-xs text-slate-400">{item.org}</span>}
                                        </div>
                                        <a href={item.link} target="_blank" rel="noopener noreferrer"
                                          className="font-bold text-slate-900 text-sm hover:text-blue-600 transition-colors leading-snug block mb-1">{item.title}</a>
                                        <p className="text-xs text-slate-500 leading-relaxed">{item.desc}</p>
                                      </div>
                                      <div className="flex flex-col items-end gap-2 shrink-0">
                                        {item.dday!==null ? (
                                          <span className={`text-xs font-bold px-3 py-1 rounded-full ${getDdayColor(item.dday)}`}>
                                            {item.dday<0?'마감':item.dday===0?'오늘마감!':`D-${item.dday}`}
                                          </span>
                                        ) : <span className="text-xs text-slate-300 px-3 py-1 rounded-full bg-slate-50">상시</span>}
                                        {item.deadline && <span className="text-xs text-slate-400">{item.deadline}까지</span>}
                                        <a href={item.link} target="_blank" rel="noopener noreferrer" className="text-xs text-blue-500 hover:text-blue-700 font-semibold">자세히 →</a>
                                      </div>
                                    </div>
                                  </div>
                                ))}
                              </div>
                            )}
                            <div className="text-center text-xs text-slate-300 pb-2">
                              출처: 기업마당(bizinfo.go.kr) · 중소벤처기업부 공식 API · 경기도 양주시 제조업 필터
                            </div>
                          </>
                        );
                      })()}
                    </div>
                  </div>
                )}

              <footer className="pb-6 text-center text-xs text-slate-400">
                <p>© 2026 LACEROOM통합관리 v20260421.84</p>
              </footer>
            </div>
          </div>
          );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
