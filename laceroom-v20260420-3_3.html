<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LACEROOM - 도금 작업 지시서</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/exceljs@4.3.0/dist/exceljs.min.js"></script>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        const Package = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>;
        const FileText = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>;
        const Calendar = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>;
        const Plus = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>;
        const Trash = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>;
        const Edit = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>;
        const X = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>;
        const Check = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="20 6 9 17 4 12"/></svg>;
        const Download = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>;
        const Copy = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>;
        const Image = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>;

        const COLOR_DEFS = [
          { name: '대금', displayName: '대금(골드)', finishType: 'both' },
          { name: '니켈', displayName: '니켈(실버)', finishType: 'both' },
          { name: '흑진주', displayName: '흑진주(블랙)', finishType: 'both' },
          { name: '흑골드', displayName: '흑골드(다크골드)', finishType: 'both' },
          { name: '로즈골드 대용금', displayName: '로즈골드 대용금(로즈골드)', finishType: 'both' },
          { name: '은', displayName: '은(리얼은도금)', finishType: 'glossOnly' },
          { name: '14k대용금', displayName: '14k대용금(14k도금)', finishType: 'glossOnly' },
          { name: '동착', displayName: '동착(흑코팅 전처리)', finishType: 'other' },
        ];

        const FINISH_OPTIONS = ['유광', '반무광'];
        const GRIND_OPTIONS = ['연마', '연마 제외', '연마 완료'];

        // 화면 표시용 (직원용 - 설명 포함, 줄바꿈)
        const getColorDisplayName = (name) => {
          const color = COLOR_DEFS.find(c => c.name === name);
          if (!color) return name;
          const parts = color.displayName.match(/^([^(]+)\(([^)]+)\)$/);
          if (parts) {
            return <>{parts[1]}<br/>({parts[2]})</>;
          }
          return color.displayName;
        };

        // 엑셀용 색상명 (공장용 - 설명 없음)
        const excelColorName = (name, finish) => {
          if (!finish) return name;
          if (name === '로즈골드 대용금') {
            return finish === '유광' ? '로즈골드(대용금)유광' : '로즈골드(반무광)대용금';
          }
          return `${name}(${finish})`;
        };

        const formatDate = (date) => date.toISOString().split('T')[0];

        function App() {
          const [activeMainTab, setActiveMainTab] = useState('plating');
          const [activeFabricTab, setActiveFabricTab] = useState('suppliers');
          const [newSupplier, setNewSupplier] = useState({ name: '', phone: '', mobile: '', location: '' });
          const [newFabric, setNewFabric] = useState({});
          const [activeTab, setActiveTab] = useState('products');
          const [products, setProducts] = useState([]);
          const [history, setHistory] = useState([]);
          
          // 도금미수금 데이터
          const [receivables, setReceivables] = useState([]);
          const [fabricSuppliersState, setFabricSuppliersState] = useState([]);
          const [fabricOrders, setFabricOrders] = useState([]);

          
          // 프리랜서 데이터
          const [freelancers, setFreelancers] = useState([]);
          const [freelancerWorks, setFreelancerWorks] = useState([]);
          const [filterMonth, setFilterMonth] = useState('');
          const [filterFreelancerId, setFilterFreelancerId] = useState('');
          
          const [productForm, setProductForm] = useState({
            name: '', 
            grindRequired: true, 
            image: null, 
            imagePreview: null,
            grindCost: '',
            injectionCost: '',
            springCost: '',
            pinCost: '',
            platingCosts: {} // 색상별 유광/반무광 도금 단가
          });

          const [editingProduct, setEditingProduct] = useState(null);

          const [orderForm, setOrderForm] = useState({
            date: formatDate(new Date()), products: []
          });

          useEffect(() => {
            try {
              const savedProducts = localStorage.getItem('plating_products');
              const savedHistory = localStorage.getItem('plating_history');
              const savedReceivables = localStorage.getItem('plating_receivables');
              const savedFreelancers = localStorage.getItem('plating_freelancers');
              const savedFreelancerWorks = localStorage.getItem('plating_freelancer_works');
              if (savedProducts) setProducts(JSON.parse(savedProducts));
              if (savedHistory) setHistory(JSON.parse(savedHistory));
              if (savedReceivables) setReceivables(JSON.parse(savedReceivables));
              const savedFabricSuppliers = localStorage.getItem('fabric_suppliers');
              if (savedFabricSuppliers) setFabricSuppliersState(JSON.parse(savedFabricSuppliers));

              if (savedFreelancers) setFreelancers(JSON.parse(savedFreelancers));
              if (savedFreelancerWorks) setFreelancerWorks(JSON.parse(savedFreelancerWorks));
            } catch (e) {
              console.error('localStorage 오류:', e);
              alert('데이터 로드 실패. Chrome을 --allow-file-access-from-files 플래그로 실행하세요.');
            }
          }, []);

          const saveProducts = (data) => {
            setProducts(data);
            try {
              localStorage.setItem('plating_products', JSON.stringify(data));
            } catch (e) {
              console.error('저장 오류:', e);
            }
          };

          const saveHistory = (data) => {
            setHistory(data);
            try {
              localStorage.setItem('plating_history', JSON.stringify(data));
            } catch (e) {
              console.error('저장 오류:', e);
            }
          };

          const saveReceivables = (data) => {
            setReceivables(data);
            try {
              localStorage.setItem('plating_receivables', JSON.stringify(data));
            } catch (e) {
              console.error('저장 오류:', e);
            }
          };

          const saveFreelancers = (data) => {
            setFreelancers(data);
            try {
              localStorage.setItem('plating_freelancers', JSON.stringify(data));
            } catch (e) {
              console.error('저장 오류:', e);
            }
          };

          const saveFreelancerWorks = (data) => {
            setFreelancerWorks(data);
            try {
              localStorage.setItem('plating_freelancer_works', JSON.stringify(data));
            } catch (e) {
              console.error('저장 오류:', e);
            }
          };

          const handleImageUpload = (e) => {
            const file = e.target.files[0];
            if (file) {
              const reader = new FileReader();
              reader.onloadend = () => {
                setProductForm({...productForm, image: reader.result, imagePreview: reader.result});
              };
              reader.readAsDataURL(file);
            }
          };

          const handleAddProduct = () => {
            if (!productForm.name.trim()) return alert('제품명을 입력하세요');
            const newProduct = {
              id: Date.now(),
              name: productForm.name,
              grindRequired: productForm.grindRequired,
              image: productForm.image,
              platingCosts: productForm.platingCosts,
              grindCost: productForm.grindCost,
              injectionCost: productForm.injectionCost,
              springCost: productForm.springCost,
              pinCost: productForm.pinCost,
              createdAt: new Date().toISOString()
            };
            saveProducts([...products, newProduct]);
            setProductForm({ 
              name: '', 
              grindRequired: true, 
              image: null, 
              imagePreview: null,
              grindCost: '',
              injectionCost: '',
              springCost: '',
              pinCost: '',
              platingCosts: {}
            });
            alert('제품 등록 완료!');
          };

          const handleDeleteProduct = (id) => {
            if (confirm('삭제하시겠습니까?')) {
              saveProducts(products.filter(p => p.id !== id));
            }
          };

          const handleEditProduct = (product) => {
            setEditingProduct(product);
            setProductForm({
              name: product.name,
              grindRequired: product.grindRequired,
              image: product.image,
              imagePreview: product.image,
              platingCosts: product.platingCosts || {},
              grindCost: product.grindCost || '',
              injectionCost: product.injectionCost || '',
              springCost: product.springCost || '',
              pinCost: product.pinCost || ''
            });
          };

          const handleUpdateProduct = () => {
            if (!productForm.name.trim()) return alert('제품명을 입력하세요');
            
            const updatedProducts = products.map(p => 
              p.id === editingProduct.id ? {
                ...p,
                name: productForm.name,
                grindRequired: productForm.grindRequired,
                image: productForm.image,
                platingCosts: productForm.platingCosts,
                grindCost: productForm.grindCost,
                injectionCost: productForm.injectionCost,
                springCost: productForm.springCost,
                pinCost: productForm.pinCost
              } : p
            );
            
            saveProducts(updatedProducts);
            setEditingProduct(null);
            setProductForm({
              name: '', 
              grindRequired: true, 
              image: null, 
              imagePreview: null,
              grindCost: '',
              injectionCost: '',
              springCost: '',
              pinCost: '',
              platingCosts: {}
            });
            alert('제품 수정 완료!');
          };

          const handleAddProductToOrder = (productId) => {
            if (!productId) return alert('제품을 선택하세요');
            
            const product = products.find(p => p.id === productId);
            
            // 이미 추가된 연마 상태 찾기
            const existingGrinds = orderForm.products
              .filter(p => p.productId === productId)
              .map(p => p.grind);
            
            // 사용 가능한 연마 상태 찾기
            const availableGrind = GRIND_OPTIONS.find(g => !existingGrinds.includes(g));
            
            if (!availableGrind) {
              return alert(`"${product.name}"의 모든 연마 상태가 이미 추가되었습니다.`);
            }
            
            // 연마 필요 여부에 따라 기본값 설정
            let defaultGrind = product.grindRequired ? '연마' : '연마 제외';
            const grindToUse = existingGrinds.includes(defaultGrind) ? availableGrind : defaultGrind;
            
            setOrderForm({
              ...orderForm,
              products: [{
                productId: product.id,
                productName: product.name,
                grindRequired: product.grindRequired,
                grind: grindToUse,
                image: product.image,
                items: []
              }, ...orderForm.products]
            });
            
            if (grindToUse !== defaultGrind) {
              alert(`"${product.name} (${defaultGrind})"는 이미 추가되어\n자동으로 "${grindToUse}"로 추가되었습니다.`);
            }
          };

          const handleRemoveProductFromOrder = (productId, grind) => {
            setOrderForm({
              ...orderForm,
              products: orderForm.products.filter(p => !(p.productId === productId && p.grind === grind))
            });
          };

          const updateGrind = (productId, oldGrind, newGrind) => {
            const newProducts = orderForm.products.map(p => {
              if (p.productId === productId && p.grind === oldGrind) {
                return {...p, grind: newGrind};
              }
              return p;
            });
            setOrderForm({ ...orderForm, products: newProducts });
          };

          const handleAddColorItem = (productId, grind) => {
            const newProducts = orderForm.products.map(p => {
              if (p.productId === productId && p.grind === grind) {
                return {...p, items: [...p.items, { color: '대금', finish: '유광', qty: 1 }]};
              }
              return p;
            });
            setOrderForm({ ...orderForm, products: newProducts });
          };

          const handleRemoveColorItem = (productId, grind, itemIndex) => {
            const newProducts = orderForm.products.map(p => {
              if (p.productId === productId && p.grind === grind) {
                return {...p, items: p.items.filter((_, i) => i !== itemIndex)};
              }
              return p;
            });
            setOrderForm({ ...orderForm, products: newProducts });
          };

          const updateColorItem = (productId, grind, itemIndex, field, value) => {
            const newProducts = orderForm.products.map(p => {
              if (p.productId === productId && p.grind === grind) {
                const newItems = [...p.items];
                newItems[itemIndex] = { ...newItems[itemIndex], [field]: value };
                return { ...p, items: newItems };
              }
              return p;
            });
            setOrderForm({ ...orderForm, products: newProducts });
          };

          const handleCreateOrder = () => {
            if (orderForm.products.length === 0) {
              alert('제품을 추가하세요');
              return;
            }
            
            for (const product of orderForm.products) {
              if (product.items.length === 0) {
                alert(`${product.productName} (${product.grind})에 색상을 추가하세요`);
                return;
              }
              
              const colorMap = new Map();
              for (const item of product.items) {
                const colorKey = excelColorName(item.color, item.finish);
                if (colorMap.has(colorKey)) {
                  alert(`${product.productName}에 중복된 색상이 있습니다:\n"${colorKey}"\n\n같은 색상/구분은 수량을 합쳐서 하나로 입력해주세요.`);
                  return;
                }
                colorMap.set(colorKey, true);
              }
            }

            try {
              const existingOrdersOnDate = history.filter(h => h.date === orderForm.date);
              const orderNum = Math.max(0, ...existingOrdersOnDate.map(h => h.orderNum || 0)) + 1;

              const newOrder = {
                id: Date.now(),
                date: orderForm.date,
                orderNum,
                products: orderForm.products.map(product => ({
                  productId: product.productId,
                  productName: product.productName,
                  grind: product.grind,
                  image: product.image,
                  items: product.items.map(item => ({
                    color: item.color,
                    finish: item.finish || '',
                    qty: parseInt(item.qty) || 0,
                    received: false,
                    receivedDate: ''
                  })),
                  total: product.items.reduce((sum, item) => sum + (parseInt(item.qty) || 0), 0)
                })),
                totalQty: orderForm.products.reduce((sum, product) => 
                  sum + product.items.reduce((s, item) => s + (parseInt(item.qty) || 0), 0), 0
                ),
                createdAt: new Date().toISOString()
              };

              const newHistory = [newOrder, ...history];
              saveHistory(newHistory);
              
              setOrderForm({ date: formatDate(new Date()), products: [] });
              
              alert(`${orderNum}차 작업 지시서 생성 완료!`);
              setActiveTab('history');
            } catch (error) {
              console.error('오류:', error);
              alert('작업 지시서 생성 실패. 콘솔을 확인하세요.');
            }
          };

          const handleReceiveItem = (orderId, productIndex, itemIndex) => {
            const newHistory = history.map(order => {
              if (order.id === orderId) {
                const newProducts = [...order.products];
                const newItems = [...newProducts[productIndex].items];
                const currentStatus = newItems[itemIndex].received;
                newItems[itemIndex] = {
                  ...newItems[itemIndex],
                  received: !currentStatus,
                  receivedDate: !currentStatus ? formatDate(new Date()) : ''
                };
                newProducts[productIndex] = { ...newProducts[productIndex], items: newItems };
                return { ...order, products: newProducts };
              }
              return order;
            });
            saveHistory(newHistory);
          };

          const handleDeleteOrder = (orderId) => {
            if (confirm('이 작업 지시서를 삭제하시겠습니까?')) {
              saveHistory(history.filter(h => h.id !== orderId));
            }
          };

          const handleDownloadExcel = async (order) => {
            const ExcelJS = window.ExcelJS;
            const workbook = new ExcelJS.Workbook();
            const worksheet = workbook.addWorksheet('작업지시서');

            // 제목
            worksheet.mergeCells('A1:H1');
            worksheet.getCell('A1').value = '주식회사 골드 / 도금 작업 지시서';
            worksheet.getCell('A1').font = { size: 22, bold: true };
            worksheet.getCell('A1').alignment = { horizontal: 'center', vertical: 'middle' };
            worksheet.getRow(1).height = 32;

            // 헤더
            const headers = ['출고날짜', '품명', '이미지', '연마', '색상', '구분', '출고\n수량', '비고'];
            worksheet.getRow(2).values = headers;
            worksheet.getRow(2).font = { bold: true, size: 14 };
            worksheet.getRow(2).alignment = { horizontal: 'center', vertical: 'middle', wrapText: true };
            worksheet.getRow(2).height = 40;

            // 열 너비 설정
            worksheet.columns = [
              { key: 'date', width: 14 },
              { key: 'name', width: 20 },
              { key: 'image', width: 12 },
              { key: 'grind', width: 12 },
              { key: 'color', width: 25 },
              { key: 'finish', width: 12 },
              { key: 'qty', width: 12 },
              { key: 'note', width: 6.35 }
            ];

            let currentRow = 3;
            const dateStartRow = 3;
            let productIndex = 0;

            // 제품별 데이터 추가
            for (const product of order.products) {
              const startRow = currentRow;
              const isGrayBackground = productIndex % 2 === 0;
              
              // 각 색상 행 추가
              for (let i = 0; i < product.items.length; i++) {
                const item = product.items[i];
                const row = worksheet.getRow(currentRow);
                
                if (i === 0) {
                  row.getCell(1).value = order.date;
                  row.getCell(1).font = { size: 14 };
                  row.getCell(2).value = product.productName;
                  row.getCell(2).font = { size: 14 };
                  
                  // 연마 상태 텍스트 변환
                  let grindText = product.grind;
                  if (product.grind === '연마 제외') grindText = '연마\n제외';
                  if (product.grind === '연마 완료') grindText = '연마\n완료';
                  
                  row.getCell(4).value = grindText;
                  row.getCell(4).alignment = { horizontal: 'center', vertical: 'middle', wrapText: true };
                  row.getCell(4).font = { size: 14, bold: true };
                  
                  // 연마 상태별 색상
                  if (product.grind === '연마 제외') {
                    row.getCell(4).fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFFF0000' } };
                    row.getCell(4).font = { color: { argb: 'FFFFFFFF' }, bold: true, size: 14 };
                  } else if (product.grind === '연마') {
                    row.getCell(4).font = { color: { argb: 'FFFF0000' }, bold: true, size: 14 };
                    if (isGrayBackground) {
                      row.getCell(4).fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFC0C0C0' } };
                    }
                  } else if (product.grind === '연마 완료') {
                    row.getCell(4).fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF33CCFF' } };
                    row.getCell(4).font = { color: { argb: 'FFFFFFFF' }, bold: true, size: 14 };
                  }
                }
                
                row.getCell(5).value = item.color;
                row.getCell(5).font = { size: 14 };
                row.getCell(6).value = item.finish || '';
                row.getCell(6).font = { size: 14 };
                row.getCell(7).value = item.qty;
                row.getCell(7).font = { size: 14 };
                
                // 기본 배경색 (출고날짜 제외)
                if (isGrayBackground) {
                  for (let col = 2; col <= 8; col++) { // 2부터 시작 (출고날짜 제외)
                    const cell = row.getCell(col);
                    if (!cell.fill || !cell.fill.fgColor) {
                      cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFC0C0C0' } };
                    }
                  }
                }
                
                // 반무광 서식 적용
                if (item.finish === '반무광') {
                  row.getCell(5).fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFF9F26D' } };
                  row.getCell(5).font = { color: { argb: 'FFFF0000' }, bold: true, size: 14 };
                  row.getCell(6).fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFF9F26D' } };
                  row.getCell(6).font = { color: { argb: 'FFFF0000' }, bold: true, size: 14 };
                  row.getCell(7).fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFF9F26D' } };
                  row.getCell(7).font = { color: { argb: 'FFFF0000' }, bold: true, size: 14 };
                }
                
                row.height = 32;
                row.alignment = { horizontal: 'center', vertical: 'middle', wrapText: true };
                
                currentRow++;
              }

              const endRow = currentRow - 1;

              // 셀 병합
              if (product.items.length > 1) {
                worksheet.mergeCells(`B${startRow}:B${endRow}`);
                worksheet.mergeCells(`C${startRow}:C${endRow}`);
                worksheet.mergeCells(`D${startRow}:D${endRow}`);
              }

              // 이미지 추가
              if (product.image) {
                try {
                  const imageId = workbook.addImage({
                    base64: product.image,
                    extension: 'png',
                  });

                  const imageHeight = (endRow - startRow + 1) * 32;
                  worksheet.addImage(imageId, {
                    tl: { col: 2, row: startRow - 1 },
                    ext: { width: 80, height: Math.min(imageHeight * 0.9, 80) },
                    editAs: 'oneCell'
                  });
                } catch (e) {
                  console.error('이미지 추가 실패:', e);
                }
              }

              // 총수량 행
              const sumRow = worksheet.getRow(currentRow);
              sumRow.getCell(2).value = '총수량';
              sumRow.getCell(7).value = { formula: `SUM(G${startRow}:G${endRow})` };
              sumRow.getCell(7).font = { bold: true, size: 14, color: { argb: 'FFFF0000' } }; // 빨간색
              sumRow.font = { bold: true, size: 14 };
              sumRow.alignment = { horizontal: 'center', vertical: 'middle' };
              sumRow.height = 32;
              
              // 총수량 행 배경색 (출고날짜 제외)
              if (isGrayBackground) {
                for (let col = 2; col <= 8; col++) {
                  sumRow.getCell(col).fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFC0C0C0' } };
                }
              }
              
              worksheet.mergeCells(`B${currentRow}:F${currentRow}`);
              worksheet.mergeCells(`H${startRow}:H${currentRow}`);
              
              currentRow++;
              productIndex++;
            }

            // 출고날짜 열 병합 (전체)
            const dateEndRow = currentRow - 1;
            worksheet.mergeCells(`A${dateStartRow}:A${dateEndRow}`);
            worksheet.getCell(`A${dateStartRow}`).alignment = { horizontal: 'center', vertical: 'middle' };
            worksheet.getCell(`A${dateStartRow}`).font = { size: 14 };

            // 테두리 추가
            for (let row = 2; row < currentRow; row++) {
              for (let col = 1; col <= 8; col++) {
                const cell = worksheet.getRow(row).getCell(col);
                cell.border = {
                  top: { style: 'thin' },
                  left: { style: 'thin' },
                  bottom: { style: 'thin' },
                  right: { style: 'thin' }
                };
              }
            }

            // 파일 다운로드
            const buffer = await workbook.xlsx.writeBuffer();
            const blob = new Blob([buffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `도금작업지시서_${order.date}_${order.orderNum}차.xlsx`;
            link.click();
            URL.revokeObjectURL(url);
          };

              { key: 'color', width: 12 },
              { key: 'finish', width: 10 },
              { key: 'quantity', width: 10 },

                                  <th className="text-right py-3 px-4 font-bold">총금액</th>
                                  <th className="text-right py-3 px-4 font-bold whitespace-nowrap">세금(3.3%)</th>
                                  <th className="text-right py-3 px-4 font-bold">실지급액</th>
                                  <th className="text-center py-3 px-4 font-bold">지급여부</th>
                                  <th className="text-center py-3 px-4 font-bold whitespace-nowrap">지급완료일</th>
                                  <th className="text-center py-3 px-4 font-bold">세금신고</th>
                                  <th className="text-left py-3 px-4 font-bold">비고</th>
                                  <th className="text-center py-3 px-4 font-bold">관리</th>
                                </tr>
                              </thead>
                              <tbody>
                                {(() => {
                                  const endDate = document.getElementById('filterEndDate')?.value;
                                  const paidDate = document.getElementById('filterPaidDate')?.value;
                                  
                                  return freelancerWorks.filter(work => {
                                    let match = true;
                                    
                                    // 프리랜서별 필터
                                    if (filterFreelancerId) {
                                      match = match && work.freelancerId === parseInt(filterFreelancerId);
                                    }
                                    
                                    // 작업일 기간 필터
                                    if (filterMonth && work.workDate) {
                                      match = match && work.workDate >= filterMonth;
                                    }
                                    if (endDate && work.workDate) {
                                      match = match && work.workDate <= endDate;
                                    }
                                    
                                    // 지급일 기준 필터
                                    if (paidDate && work.paidDate) {
                                      const paidMonth = work.paidDate.substring(0, 7);
                                      const filterPaidMonth = paidDate.substring(0, 7);
                                      match = match && paidMonth === filterPaidMonth;
                                    }
                                    
                                    return match;
                                  }).map(work => {
                                    const freelancer = freelancers.find(f => f.id === work.freelancerId);
                                    return (
                                      <tr key={work.id} className="border-b border-slate-200 hover:bg-slate-50">
                                        <td className="py-3 px-4 whitespace-nowrap">{work.workDate}</td>
                                        <td className="py-3 px-4 font-semibold whitespace-nowrap">{freelancer?.name || '삭제된 프리랜서'}</td>
                                        <td className="py-3 px-4">{work.itemName}</td>
                                        <td className="py-3 px-4 text-center">
                                          {work.workImage ? (
                                            <img src={work.workImage} alt="작업" className="w-16 h-16 rounded-lg object-cover mx-auto border-2 border-slate-200" />
                                          ) : (
                                            <span className="text-slate-400 text-xs">없음</span>
                                          )}
                                        </td>
                                        <td className="text-center py-3 px-4">{work.qty}</td>
                                        <td className="text-right py-3 px-4 whitespace-nowrap">{work.wage.toLocaleString()}원</td>
                                        <td className="text-right py-3 px-4 font-semibold whitespace-nowrap">{work.total.toLocaleString()}원</td>
                                        <td className="text-right py-3 px-4 text-red-600 whitespace-nowrap">{work.tax.toLocaleString()}원</td>
                                        <td className="text-right py-3 px-4 font-bold text-blue-600 whitespace-nowrap">{work.payment.toLocaleString()}원</td>
                                        <td className="text-center py-3 px-4">
                                          <input
                                            type="checkbox"
                                            checked={work.paid}
                                            onChange={(e) => {
                                              const updated = freelancerWorks.map(w => 
                                                w.id === work.id ? {...w, paid: e.target.checked} : w
                                              );
                                              saveFreelancerWorks(updated);
                                            }}
                                            className="w-5 h-5"
                                          />
                                        </td>
                                        <td className="text-center py-3 px-4">
                                          <input
                                            type="date"
                                            value={work.paidDate}
                                            onChange={(e) => {
                                              const updated = freelancerWorks.map(w => 
                                                w.id === work.id ? {...w, paidDate: e.target.value} : w
                                              );
                                              saveFreelancerWorks(updated);
                                            }}
                                            className="px-2 py-1 rounded border border-slate-300 text-xs"
                                          />
                                        </td>
                                        <td className="text-center py-3 px-4">
                                          <input
                                            type="checkbox"
                                            checked={work.taxReported}
                                            onChange={(e) => {
                                              const updated = freelancerWorks.map(w => 
                                                w.id === work.id ? {...w, taxReported: e.target.checked} : w
                                              );
                                              saveFreelancerWorks(updated);
                                            }}
                                            className="w-5 h-5"
                                          />
                                        </td>
                                        <td className="py-3 px-4">
                                          <input
                                            type="text"
                                            value={work.note}
                                            onChange={(e) => {
                                              const updated = freelancerWorks.map(w => 
                                                w.id === work.id ? {...w, note: e.target.value} : w
                                              );
                                              saveFreelancerWorks(updated);
                                            }}
                                            className="px-2 py-1 rounded border border-slate-300 text-xs w-full"
                                            placeholder="비고"
                                          />
                                        </td>
                                        <td className="text-center py-3 px-4">
                                          <button
                                            onClick={() => {
                                              if (confirm('삭제하시겠습니까?')) {
                                                saveFreelancerWorks(freelancerWorks.filter(w => w.id !== work.id));
                                              }
                                            }}
                                            className="p-2 text-red-500 hover:bg-red-50 rounded-lg"
                                          >
                                            <Trash />
                                          </button>
                                        </td>
                                      </tr>
                                    );
                                  });
                                })()}
                              </tbody>
                            </table>
                          </div>

                          {/* 통계 */}
                          <div className="border-t-2 pt-6">
                            <h3 className="text-lg font-bold mb-4">프리랜서별 통계</h3>
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                              {freelancers.map(freelancer => {
                                const works = freelancerWorks.filter(w => w.freelancerId === freelancer.id);
                                const totalAmount = works.reduce((sum, w) => sum + w.total, 0);
                                const totalTax = works.reduce((sum, w) => sum + w.tax, 0);
                                const totalPayment = works.reduce((sum, w) => sum + w.payment, 0);
                                const paidAmount = works.filter(w => w.paid).reduce((sum, w) => sum + w.payment, 0);
                                const unpaidAmount = totalPayment - paidAmount;
                                
                                // 미신고 세금 계산 (지급완료일 기준)
                                const unreportedWorks = works.filter(w => !w.taxReported && w.paidDate);
                                const unreportedTotalAmount = unreportedWorks.reduce((sum, w) => sum + w.total, 0);
                                const unreportedTax = unreportedWorks.reduce((sum, w) => sum + w.tax, 0);
                                const unreportedPayment = unreportedWorks.reduce((sum, w) => sum + w.payment, 0);
                                
                                return (
                                  <div key={freelancer.id} className="p-4 border-2 border-slate-200 rounded-xl">
                                    <h4 className="font-bold text-lg mb-2">{freelancer.name}</h4>
                                    <p className="text-sm text-slate-600 mb-1">작업 건수: {works.length}건</p>
                                    <p className="text-sm text-slate-600 mb-1">총 금액: {totalAmount.toLocaleString()}원</p>
                                    <p className="text-sm text-red-600 mb-1">세금: {totalTax.toLocaleString()}원</p>
                                    <p className="text-sm text-blue-600 mb-1">실지급액: {totalPayment.toLocaleString()}원</p>
                                    <p className="text-sm text-green-600 mb-1">지급 완료: {paidAmount.toLocaleString()}원</p>
                                    <p className="text-sm text-orange-600 font-bold mb-2">미지급: {unpaidAmount.toLocaleString()}원</p>
                                    
                                    {unreportedTax > 0 && (
                                      <div className="mt-3 pt-3 border-t border-slate-300">
                                        <p className="text-sm font-bold mb-2 text-purple-700">📋 미신고 세금 내역 (지급월 기준)</p>
                                        <div className="bg-purple-50 p-3 rounded-lg mb-2">
                                          <p className="text-xs text-slate-600 mb-1">세전 금액: <span className="font-semibold text-slate-800">{unreportedTotalAmount.toLocaleString()}원</span></p>
                                          <p className="text-xs text-red-600 mb-1">세금(3.3%): <span className="font-semibold">{unreportedTax.toLocaleString()}원</span></p>
                                          <p className="text-xs text-blue-600">세후 금액: <span className="font-semibold">{unreportedPayment.toLocaleString()}원</span></p>
                                        </div>
                                        <div className="text-xs text-slate-500">
                                          <p className="font-semibold mb-1">세부내역 ({unreportedWorks.length}건):</p>
                                          {unreportedWorks.slice(0, 3).map(w => (
                                            <p key={w.id} className="ml-2 mb-1">
                                              • {w.paidDate} ({w.itemName})<br/>
                                              <span className="ml-3 text-slate-400">
                                                세전 {w.total.toLocaleString()}원 → 세금 {w.tax.toLocaleString()}원 → 세후 {w.payment.toLocaleString()}원
                                              </span>
                                            </p>
                                          ))}
                                          {unreportedWorks.length > 3 && (
                                            <p className="ml-2 text-slate-400">외 {unreportedWorks.length - 3}건...</p>
                                          )}
                                        </div>
                                      </div>
                                    )}
                                  </div>
                                );
                              })}
                            </div>
                          </div>
                        </>
                      )}
                    </div>
                  </div>
                )}

                {/* 중국발주 탭 */}
                {activeMainTab === 'china' && (
                  <div className="bg-white rounded-3xl shadow-xl border border-slate-200/60 p-16 text-center">
                    <div className="flex justify-center mb-4"><Package /></div>
                    <h2 className="text-2xl font-bold text-slate-900 mb-2">중국 발주 관리</h2>
                    <p className="text-slate-500">준비 중입니다</p>
                  </div>
                )}
              </main>

              <footer className="mt-16 pb-8 text-center text-sm text-slate-400">
                <p>© 2026 LACEROOM 비서 v20260419.6 · All rights reserved.</p>
              </footer>
            </div>
          );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
